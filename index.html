<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub | Enterprise Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HUB">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/149/149071.png">
    <style>
        :root {
            --bg: #030508; --surface: #0a0c10; --glass: rgba(13, 16, 22, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08); --primary: #3b82f6;
            --accent: #8b5cf6; --text: #ffffff; --subtext: #94a3b8;
            --danger: #ff4d4d; --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --verified: #3b82f6; --admin-bg: rgba(139, 92, 246, 0.15);
            --admin-border: rgba(139, 92, 246, 0.4);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; line-height: 1.6; }

        .view-section { display: none; opacity: 0; transform: translateY(10px); transition: var(--transition); }
        .view-section.active { display: block; opacity: 1; transform: translateY(0); }
        header { position: sticky; top: 0; z-index: 1000; padding: 15px 20px; background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
        .container { width: 92%; max-width: 600px; margin: 20px auto 120px auto; }

        .glass-card { background: var(--surface); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; margin-bottom: 16px; transition: var(--transition); position: relative; }
        .nav-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(10, 12, 16, 0.95); backdrop-filter: blur(20px); padding: 8px; border-radius: 100px; display: flex; gap: 5px; border: 1px solid var(--glass-border); z-index: 2000; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .nav-btn { width: 48px; height: 48px; border-radius: 50%; border: none; background: transparent; color: var(--subtext); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: var(--transition); }
        .nav-btn.active { background: var(--primary); color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }

        .btn-action { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; border: none; padding: 12px 24px; border-radius: 14px; font-weight: 700; cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-danger { background: linear-gradient(135deg, #ff4d4d, #c0392b); }
        input, textarea { width: 100%; padding: 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 14px; color: white; font-family: inherit; font-size: 14px; transition: var(--transition); }
        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.06); }

        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #1a1d23; border: 1px solid var(--glass-border); }
        .post-media { width: 100%; border-radius: 16px; margin-top: 12px; max-height: 400px; object-fit: cover; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .offline { background: #64748b; }

        /* Verified badge */
        .verified-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 16px; height: 16px; background: var(--verified);
            border-radius: 50%; margin-left: 4px; flex-shrink: 0;
            box-shadow: 0 0 6px rgba(59,130,246,0.6);
        }
        .verified-badge svg { width: 10px; height: 10px; fill: white; }

        /* Admin panel styles */
        .admin-card { background: var(--admin-bg); border: 1px solid var(--admin-border); border-radius: 24px; padding: 20px; margin-bottom: 16px; }
        .admin-badge { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 20px; letter-spacing: 1px; text-transform: uppercase; margin-left: 8px; }
        .admin-user-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .admin-user-row:last-child { border-bottom: none; }
        .admin-controls { display: flex; gap: 8px; margin-left: auto; flex-shrink: 0; }
        .admin-btn { padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; border: none; cursor: pointer; transition: var(--transition); }
        .admin-btn-verify { background: rgba(59,130,246,0.2); color: #3b82f6; border: 1px solid rgba(59,130,246,0.3); }
        .admin-btn-verify.active { background: #3b82f6; color: white; }
        .admin-btn-ban { background: rgba(255,77,77,0.2); color: #ff4d4d; border: 1px solid rgba(255,77,77,0.3); }
        .admin-btn-ban.active { background: #ff4d4d; color: white; }
        .admin-btn-makeadmin { background: rgba(139,92,246,0.2); color: #8b5cf6; border: 1px solid rgba(139,92,246,0.3); }
        .admin-btn-makeadmin.active { background: #8b5cf6; color: white; }

        /* Banned user overlay */
        .banned-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
        .banned-overlay h2 { color: #ff4d4d; font-size: 28px; margin-bottom: 12px; }
        .banned-overlay p { color: var(--subtext); font-size: 15px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--surface); border: 1px solid var(--glass-border); border-radius: 28px; width: 100%; max-width: 400px; max-height: 80vh; overflow-y: auto; padding: 24px; }

        .chat-scroll { height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; scroll-behavior: smooth; }
        .msg-pop { padding: 10px 16px; border-radius: 18px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .msg-sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg-rec { align-self: flex-start; background: rgba(255,255,255,0.08); border-bottom-left-radius: 4px; }
        .typing-label { font-size: 11px; color: var(--primary); margin-top: 2px; display: none; }

        .clickable { cursor: pointer; transition: 0.2s; }
        .clickable:hover { opacity: 0.8; }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .comment-item { font-size: 13px; padding: 8px 0; border-top: 1px solid rgba(255,255,255,0.03); display: flex; flex-direction: column; gap: 4px; }
        .comment-actions { display: flex; gap: 12px; font-size: 11px; color: var(--subtext); margin-top: 2px; }

        #err-toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: #ff4d4d; color: white; padding: 12px 20px; border-radius: 14px;
            font-size: 13px; font-weight: 600; z-index: 9999; display: none;
            max-width: 90%; text-align: center; box-shadow: 0 4px 20px rgba(255,77,77,0.5);
            word-break: break-word;
        }
        #success-toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: #22c55e; color: white; padding: 12px 20px; border-radius: 14px;
            font-size: 13px; font-weight: 600; z-index: 9999; display: none;
            max-width: 90%; text-align: center; box-shadow: 0 4px 20px rgba(34,197,94,0.4);
        }
        .username-row { display: inline-flex; align-items: center; gap: 2px; }
    </style>
</head>
<body>

<div id="err-toast"></div>
<div id="success-toast"></div>

<div id="modal-list" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="modal-title" style="margin-bottom: 20px;">Users</h3>
        <div id="modal-body"></div>
    </div>
</div>

<div id="auth-screen">
    <div class="glass-card" style="margin: 100px auto; width: 340px; text-align: center;">
        <h2 style="font-size: 32px; margin-bottom: 8px;">Hub</h2>
        <div id="signup-fields" class="hidden">
            <input type="text" id="auth-nick" placeholder="Username" style="margin-bottom: 10px;">
        </div>
        <input type="email" id="auth-email" placeholder="Email" style="margin-bottom: 10px;">
        <input type="password" id="auth-pass" placeholder="Password" style="margin-bottom: 20px;">
        <button class="btn-action" style="width: 100%;" onclick="handleAuth()">Continue</button>
        <p onclick="toggleAuth()" id="auth-toggle-text" style="margin-top: 20px; font-size: 13px; color: var(--subtext); cursor: pointer;">New here? <span style="color:var(--primary)">Create Account</span></p>
    </div>
</div>

<div id="app-main" class="hidden">
    <header>
        <span style="font-weight: 800; font-size: 20px;">HUB<span style="color:var(--primary)">.</span></span>
        <div style="display:flex; align-items:center; gap:10px;">
            <button id="admin-nav-btn" class="hidden" onclick="nav('admin')" style="background:linear-gradient(135deg,#8b5cf6,#6d28d9); border:none; color:white; padding:6px 14px; border-radius:10px; font-weight:700; font-size:12px; cursor:pointer;">⚙️ ADMIN</button>
            <button onclick="logout()" style="background:none; border:none; color:var(--subtext); cursor:pointer; font-weight:700;">Logout</button>
        </div>
    </header>

    <div class="container">
        <section id="v-home" class="view-section active">
            <div class="glass-card">
                <textarea id="p-text" placeholder="What's happening?" rows="3" style="margin-bottom: 12px;"></textarea>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label class="clickable" style="font-size:12px; font-weight:700; color:var(--subtext);">
                        🖼️ MEDIA <input type="file" id="p-file" accept="image/*,video/*" style="display:none">
                    </label>
                    <button id="p-btn" class="btn-action" onclick="createPost()">Post Blast</button>
                </div>
            </div>
            <div id="feed-mount"></div>
        </section>

        <section id="v-search" class="view-section">
            <div class="glass-card"><input type="text" placeholder="Search people..." oninput="searchUsers(this.value)"></div>
            <div id="search-mount"></div>
        </section>

        <section id="v-chat" class="view-section">
            <div class="glass-card">
                <h3 style="margin-bottom:15px;">Global Chat</h3>
                <div id="chat-mount" class="chat-scroll"></div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <input type="text" id="chat-in" placeholder="Message..." onkeydown="if(event.key==='Enter') sendGlobalChat()">
                    <button id="chat-send-btn" class="btn-action" onclick="sendGlobalChat()">Send</button>
                </div>
            </div>
        </section>

        <section id="v-inbox" class="view-section">
            <h3 style="margin-bottom:20px;">Messages</h3>
            <div id="inbox-mount"></div>
        </section>

        <section id="v-dm" class="view-section">
            <div class="glass-card">
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px;">
                    <button onclick="nav('inbox')" style="background:none; border:none; color:var(--primary); cursor:pointer; font-size:20px;">←</button>
                    <img id="dm-avatar" src="" class="avatar">
                    <div>
                        <b id="dm-name">Chat</b>
                        <div id="dm-typing" class="typing-label">typing...</div>
                    </div>
                </div>
                <div id="dm-mount" class="chat-scroll"></div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <input type="text" id="dm-in" placeholder="Private message..." oninput="handleTyping()" onkeydown="if(event.key==='Enter') sendDirectMessage()">
                    <button id="dm-send-btn" class="btn-action" onclick="sendDirectMessage()">Send</button>
                </div>
            </div>
        </section>

        <section id="v-profile" class="view-section">
            <div class="glass-card" style="text-align:center;">
                <img id="u-pic" src="" class="avatar" style="width:100px; height:100px; border-radius:35px; border:3px solid var(--glass-border);">
                <h2 id="u-nick" style="margin:12px 0 4px 0; display:flex; align-items:center; justify-content:center; gap:6px;">@username</h2>
                <div id="u-status-tag" style="font-size:12px; margin-bottom:15px;"></div>
                <div id="u-actions" style="margin: 15px 0; display:flex; justify-content:center; gap:10px; flex-wrap:wrap;"></div>
                <div style="display:flex; justify-content:center; gap:30px; margin-top:20px; border-top:1px solid var(--glass-border); padding-top:20px;">
                    <div><b id="u-postcount">0</b><br><small style="color:var(--subtext)">Posts</small></div>
                    <div class="clickable" onclick="openRelationModal('followers')"><b id="u-foll">0</b><br><small style="color:var(--subtext)">Followers</small></div>
                    <div class="clickable" onclick="openRelationModal('following')"><b id="u-fing">0</b><br><small style="color:var(--subtext)">Following</small></div>
                </div>
            </div>
            <div id="u-feed"></div>
        </section>

        <!-- ADMIN PANEL -->
        <section id="v-admin" class="view-section">
            <div class="admin-card">
                <h2 style="margin:0 0 6px 0;">⚙️ Admin Panel <span class="admin-badge">ADMIN</span></h2>
                <p style="color:var(--subtext); font-size:13px; margin:0 0 20px 0;">Manage all users — verify, ban, or promote</p>
                <input type="text" id="admin-search" placeholder="Filter users..." oninput="filterAdminUsers(this.value)" style="margin-bottom:16px;">
                <div id="admin-users-mount">Loading users...</div>
            </div>
        </section>
    </div>

    <nav class="nav-bar">
        <button class="nav-btn active" id="n-home" onclick="nav('home')">🏠</button>
        <button class="nav-btn" id="n-search" onclick="nav('search')">🔍</button>
        <button class="nav-btn" id="n-chat" onclick="nav('chat')">💬</button>
        <button class="nav-btn" id="n-inbox" onclick="nav('inbox')">✉️</button>
        <button class="nav-btn" id="n-profile" onclick="nav('profile')">👤</button>
    </nav>
</div>

<!-- PWA Service Worker Registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/socialhub/sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.log('SW failed:', err));
    });
  }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, deleteDoc, updateDoc, increment, where, getDoc, getDocs, arrayUnion, arrayRemove, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDtYOFVBuPYO_CGYz1JBjOGqJoknHvZClI",
        authDomain: "socialhub-2851f.firebaseapp.com",
        projectId: "socialhub-2851f",
        storageBucket: "socialhub-2851f.firebasestorage.app",
        messagingSenderId: "38201819416",
        appId: "1:38201819416:web:db2997ca5377ac71a29e6d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const State = {
        listeners: {}, following: [], isLoginMode: true,
        activeChatId: null, activeProfileId: null,
        defaultPic: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
        typingTimeout: null, isAdmin: false, currentUserData: null,
        allAdminUsers: []
    };
    const kill = (k) => { if(State.listeners[k]) { State.listeners[k](); delete State.listeners[k]; } };

    // --- VERIFIED BADGE HTML ---
    const verifiedHTML = `<span class="verified-badge" title="Verified"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>`;

    const showError = (msg) => {
        console.error('HUB ERROR:', msg);
        const t = document.getElementById('err-toast');
        t.innerText = '⚠️ ' + msg;
        t.style.display = 'block';
        clearTimeout(window._errTimer);
        window._errTimer = setTimeout(() => { t.style.display = 'none'; }, 6000);
    };

    const showSuccess = (msg) => {
        const t = document.getElementById('success-toast');
        t.innerText = '✅ ' + msg;
        t.style.display = 'block';
        clearTimeout(window._sucTimer);
        window._sucTimer = setTimeout(() => { t.style.display = 'none'; }, 3000);
    };

    const getUserData = async (uid) => {
        const snap = await getDoc(doc(db, "users", uid));
        if (snap.exists()) return snap.data();
        const fallback = { username: auth.currentUser?.email?.split('@')[0] || 'user', avatar: '', followersCount: 0, followingCount: 0, postsCount: 0, online: true, verified: false, banned: false, isAdmin: false };
        await setDoc(doc(db, "users", uid), fallback, { merge: true });
        return fallback;
    };

    // Check if banned and show overlay
    const checkBanned = (userData) => {
        if (userData?.banned) {
            document.getElementById('app-main').innerHTML = `
                <div class="banned-overlay">
                    <h2>🚫 Account Banned</h2>
                    <p>Your account has been banned by an administrator.<br>If you believe this is a mistake, contact support.</p>
                </div>`;
        }
    };

    onAuthStateChanged(auth, async (u) => {
        if (u) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-main').classList.remove('hidden');
            try {
                await updateDoc(doc(db, "users", u.uid), { online: true, lastSeen: serverTimestamp() });
            } catch(e) {
                await setDoc(doc(db, "users", u.uid), { online: true, lastSeen: serverTimestamp(), username: u.email.split('@')[0], avatar: '', followersCount: 0, followingCount: 0, postsCount: 0, verified: false, banned: false, isAdmin: false }, { merge: true });
            }
            // Load current user data and check admin/banned status
            const myData = await getUserData(u.uid);
            State.currentUserData = myData;
            State.isAdmin = myData?.isAdmin === true;
            checkBanned(myData);
            // Show admin button if admin
            if (State.isAdmin) {
                document.getElementById('admin-nav-btn').classList.remove('hidden');
            }
            State.listeners.me = onSnapshot(collection(db, "users", u.uid, "following"), s => { State.following = s.docs.map(d => d.id); });
            // Live-listen for banned status changes
            State.listeners.myDoc = onSnapshot(doc(db, "users", u.uid), snap => {
                if (snap.exists() && snap.data().banned) checkBanned(snap.data());
            });
            nav('home');
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('app-main').classList.add('hidden');
        }
    });

    window.nav = (target, params = null) => {
        Object.keys(State.listeners).forEach(k => { if(k!=='me' && k!=='myDoc') kill(k); });
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`v-${target}`).classList.add('active');
        if(document.getElementById(`n-${target}`)) document.getElementById(`n-${target}`).classList.add('active');
        if(target === 'home') loadGlobalFeed();
        if(target === 'chat') loadGlobalChat();
        if(target === 'profile') loadUserProfile(params || auth.currentUser.uid);
        if(target === 'inbox') loadInbox();
        if(target === 'dm') openConversation(params);
        if(target === 'admin') loadAdminPanel();
        window.scrollTo(0,0);
    };

    // --- GLOBAL CHAT ---
    window.sendGlobalChat = async () => {
        const inp = document.getElementById('chat-in');
        const val = inp.value.trim();
        if(!val || !auth.currentUser) return;
        const btn = document.getElementById('chat-send-btn');
        btn.disabled = true;
        try {
            const u = await getUserData(auth.currentUser.uid);
            await addDoc(collection(db, "chats"), { uid: auth.currentUser.uid, name: u.username, text: val, createdAt: serverTimestamp() });
            inp.value = "";
        } catch(e) {
            showError("Chat send failed: " + e.message);
        } finally {
            btn.disabled = false;
        }
    };

    function loadGlobalChat() {
        State.listeners.chat = onSnapshot(
            query(collection(db, "chats"), orderBy("createdAt", "asc"), limit(50)),
            s => {
                const b = document.getElementById('chat-mount');
                b.innerHTML = s.docs.map(d => {
                    const data = d.data();
                    return `<div class="msg-pop ${data.uid===auth.currentUser.uid?'msg-sent':'msg-rec'}">
                        <b>${data.name}${data.verified?verifiedHTML:''}</b><br>${data.text}
                    </div>`;
                }).join('');
                b.scrollTop = b.scrollHeight;
            },
            e => showError("Chat load error: " + e.message)
        );
    }

    // --- TYPING & PRIVATE MESSAGES ---
    window.handleTyping = async () => {
        if(!State.activeChatId) return;
        try {
            await setDoc(doc(db, "conversations", State.activeChatId), { [auth.currentUser.uid]: true }, { merge: true });
            clearTimeout(State.typingTimeout);
            State.typingTimeout = setTimeout(async () => {
                await setDoc(doc(db, "conversations", State.activeChatId), { [auth.currentUser.uid]: false }, { merge: true });
            }, 2000);
        } catch(e) {}
    };

    async function openConversation(otherId) {
        const chatId = [auth.currentUser.uid, otherId].sort().join('_');
        State.activeChatId = chatId;
        try {
            const other = await getUserData(otherId);
            document.getElementById('dm-avatar').src = other.avatar || State.defaultPic;
            document.getElementById('dm-name').innerHTML = `@${other.username}${other.verified?verifiedHTML:''}`;
        } catch(e) { showError("Could not load user: " + e.message); }

        State.listeners.dm = onSnapshot(
            query(collection(db, "conversations", chatId, "messages"), orderBy("createdAt", "asc"), limit(50)),
            s => {
                const box = document.getElementById('dm-mount');
                box.innerHTML = s.docs.map(d => `<div class="msg-pop ${d.data().uid===auth.currentUser.uid?'msg-sent':'msg-rec'}">${d.data().text}</div>`).join('');
                box.scrollTop = box.scrollHeight;
            },
            e => showError("DM load error: " + e.message)
        );

        State.listeners.typing = onSnapshot(doc(db, "conversations", chatId), snap => {
            if(snap.exists() && snap.data()[otherId] === true) document.getElementById('dm-typing').style.display = 'block';
            else document.getElementById('dm-typing').style.display = 'none';
        }, () => {});
    }

    window.sendDirectMessage = async () => {
        const inp = document.getElementById('dm-in');
        const val = inp.value.trim();
        if(!val || !State.activeChatId) return;
        const btn = document.getElementById('dm-send-btn');
        btn.disabled = true;
        try {
            await addDoc(collection(db, "conversations", State.activeChatId, "messages"), { uid: auth.currentUser.uid, text: val, createdAt: serverTimestamp() });
            const otherId = State.activeChatId.split('_').find(id => id !== auth.currentUser.uid);
            const me = await getUserData(auth.currentUser.uid);
            const other = await getUserData(otherId);
            const meta = { lastMsg: val, lastSeen: serverTimestamp() };
            await setDoc(doc(db, "users", otherId, "conversations", auth.currentUser.uid), { ...meta, username: me.username, avatar: me.avatar || '' }, { merge: true });
            await setDoc(doc(db, "users", auth.currentUser.uid, "conversations", otherId), { ...meta, username: other.username, avatar: other.avatar || '' }, { merge: true });
            inp.value = "";
            await setDoc(doc(db, "conversations", State.activeChatId), { [auth.currentUser.uid]: false }, { merge: true });
        } catch(e) {
            showError("DM send failed: " + e.message);
        } finally {
            btn.disabled = false;
        }
    };

    // --- FEED, LIKES, COMMENTS ---
    window.createPost = async () => {
        const txt = document.getElementById('p-text').value.trim(), file = document.getElementById('p-file').files[0];
        if(!txt && !file) return;
        const btn = document.getElementById('p-btn'); btn.disabled = true;
        try {
            const u = await getUserData(auth.currentUser.uid);
            let media = null, mType = 'none';
            if(file) {
                mType = file.type.startsWith('video') ? 'video' : 'image';
                media = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(file); });
            }
            await addDoc(collection(db, "posts"), {
                uid: auth.currentUser.uid, username: u.username, avatar: u.avatar || State.defaultPic,
                verified: u.verified || false,
                content: txt, media, mediaType: mType, likes: 0, likedBy: [], createdAt: serverTimestamp()
            });
            await updateDoc(doc(db, "users", auth.currentUser.uid), { postsCount: increment(1) });
            document.getElementById('p-text').value = ""; document.getElementById('p-file').value = "";
        } catch(e) {
            showError("Post failed: " + e.message);
        } finally { btn.disabled = false; }
    };

    function drawFeed(snap, targetId) {
        const box = document.getElementById(targetId);
        if (!box) return;
        box.innerHTML = snap.docs.map(d => {
            const p = d.data(); const id = d.id; const isLiked = (p.likedBy || []).includes(auth.currentUser.uid);
            return `<div class="glass-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="clickable" onclick="nav('profile','${p.uid}')" style="display:flex; align-items:center; gap:10px;">
                        <img src="${p.avatar}" class="avatar">
                        <span class="username-row"><b>@${p.username}</b>${p.verified?verifiedHTML:''}</span>
                    </div>
                    ${p.uid === auth.currentUser.uid || State.isAdmin ? `<button onclick="deletePost('${id}','${p.uid}')" style="background:none; border:none; color:var(--danger); cursor:pointer;">🗑️</button>` : ''}
                </div>
                <p style="margin:15px 0; white-space:pre-wrap;">${p.content}</p>
                ${p.media ? (p.mediaType==='video' ? `<video src="${p.media}" controls class="post-media"></video>` : `<img src="${p.media}" class="post-media">`) : ''}
                <div style="margin-top:15px; display:flex; gap:20px; font-size:13px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom:12px;">
                    <span class="clickable" onclick="handleLike('${id}')" style="color:${isLiked?'var(--primary)':'#fff'}">${isLiked?'❤️':'🤍'} ${p.likes||0}</span>
                </div>
                <div id="cm-mount-${id}" style="margin-top:10px;"></div>
                <div style="display:flex; gap:8px; margin-top:12px;">
                    <input type="text" id="cm-in-${id}" placeholder="Add a comment..." style="padding:8px 12px; border-radius:10px; font-size:12px;" onkeydown="if(event.key==='Enter') addComment('${id}')">
                    <button class="btn-action" style="padding:8px 14px; border-radius:10px;" onclick="addComment('${id}')">Post</button>
                </div>
            </div>`;
        }).join('');
        snap.docs.forEach(d => syncComments(d.id, d.data().uid));
    }

    const syncComments = (pid, postOwnerUid) => {
        kill(`cm-${pid}`);
        State.listeners[`cm-${pid}`] = onSnapshot(
            query(collection(db, "posts", pid, "comments"), orderBy("createdAt", "asc")),
            s => {
                const el = document.getElementById(`cm-mount-${pid}`);
                if(el) {
                    el.innerHTML = s.docs.map(d => {
                        const c = d.data(); const cid = d.id;
                        const cLiked = (c.likedBy || []).includes(auth.currentUser.uid);
                        const canDelete = c.uid === auth.currentUser.uid || postOwnerUid === auth.currentUser.uid || State.isAdmin;
                        return `<div class="comment-item">
                            <div>
                                <b class="clickable" onclick="nav('profile','${c.uid}')">@${c.username}${c.verified?verifiedHTML:''}:</b> ${c.text}
                            </div>
                            <div class="comment-actions">
                                <span class="clickable" onclick="handleCommentLike('${pid}', '${cid}')" style="color:${cLiked?'var(--primary)':'inherit'}">${cLiked?'❤️':'🤍'} ${c.likes||0}</span>
                                ${canDelete ? `<span class="clickable" style="color:var(--danger)" onclick="deleteComment('${pid}', '${cid}', '${postOwnerUid}')">Delete</span>` : ''}
                            </div>
                        </div>`;
                    }).join('');
                }
            },
            e => showError("Comments error: " + e.message)
        );
    };

    window.addComment = async (pid) => {
        const inp = document.getElementById(`cm-in-${pid}`);
        if (!inp) return;
        const val = inp.value.trim();
        if(!val || !auth.currentUser) return;
        inp.disabled = true;
        try {
            const u = await getUserData(auth.currentUser.uid);
            await addDoc(collection(db, "posts", pid, "comments"), {
                uid: auth.currentUser.uid, username: u.username,
                verified: u.verified || false,
                text: val, likes: 0, likedBy: [], createdAt: serverTimestamp()
            });
            inp.value = "";
        } catch(e) {
            showError("Comment failed: " + e.message);
        } finally {
            inp.disabled = false;
            inp.focus();
        }
    };

    window.handleCommentLike = async (pid, cid) => {
        if (!auth.currentUser) return;
        try {
            const r = doc(db, "posts", pid, "comments", cid);
            const s = await getDoc(r);
            if (!s.exists()) return;
            const l = s.data().likedBy || [];
            const has = l.includes(auth.currentUser.uid);
            await updateDoc(r, { likes: increment(has ? -1 : 1), likedBy: has ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid) });
        } catch(e) { showError("Like failed: " + e.message); }
    };

    window.deleteComment = async (pid, cid, postOwnerUid) => {
        if (!auth.currentUser) return;
        if(confirm("Delete comment?")) {
            try {
                const cRef = doc(db, "posts", pid, "comments", cid);
                const cSnap = await getDoc(cRef);
                if (!cSnap.exists()) return;
                const canDelete = cSnap.data().uid === auth.currentUser.uid || postOwnerUid === auth.currentUser.uid || State.isAdmin;
                if (!canDelete) { showError("No permission to delete this comment."); return; }
                kill(`cm-${pid}`);
                await deleteDoc(cRef);
                syncComments(pid, postOwnerUid);
            } catch(e) { showError("Delete failed: " + e.message); }
        }
    };

    window.handleLike = async (id) => {
        if (!auth.currentUser) return;
        try {
            const r = doc(db, "posts", id);
            const s = await getDoc(r);
            if (!s.exists()) return;
            const l = s.data().likedBy || [];
            const has = l.includes(auth.currentUser.uid);
            await updateDoc(r, { likes: increment(has ? -1 : 1), likedBy: has ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid) });
        } catch(e) { showError("Like failed: " + e.message); }
    };

    window.deletePost = async (id, postOwnerUid) => {
        const canDelete = postOwnerUid === auth.currentUser.uid || State.isAdmin;
        if (!canDelete) { showError("No permission to delete this post."); return; }
        if(confirm("Delete post?")) {
            try {
                await deleteDoc(doc(db, "posts", id));
                await updateDoc(doc(db, "users", postOwnerUid), { postsCount: increment(-1) });
            } catch(e) { showError("Delete failed: " + e.message); }
        }
    };

    // --- PROFILE & SEARCH ---
    async function loadUserProfile(uid) {
        State.activeProfileId = uid;
        State.listeners.profData = onSnapshot(doc(db, "users", uid), (uSnap) => {
            if (!uSnap.exists()) return;
            const u = uSnap.data();
            document.getElementById('u-pic').src = u.avatar || State.defaultPic;
            // Show verified badge next to username
            document.getElementById('u-nick').innerHTML = `@${u.username}${u.verified ? verifiedHTML : ''}${u.isAdmin ? '<span class="admin-badge">ADMIN</span>' : ''}`;
            document.getElementById('u-foll').innerText = u.followersCount || 0;
            document.getElementById('u-fing').innerText = u.followingCount || 0;
            document.getElementById('u-postcount').innerText = u.postsCount || 0;
            document.getElementById('u-status-tag').innerHTML = `<span class="status-dot ${u.online?'online':'offline'}"></span>${u.online?'Online':'Offline'}`;
            const acts = document.getElementById('u-actions');
            if(uid === auth.currentUser.uid) {
                acts.innerHTML = `<button class="btn-action" onclick="editUsernamePrompt()">Edit Name</button>
                                  <input type="file" id="up-av" style="display:none" onchange="uploadAvatar()"><button class="btn-action" onclick="document.getElementById('up-av').click()">Avatar</button>`;
            } else {
                const isF = State.following.includes(uid);
                acts.innerHTML = `<button class="btn-action" onclick="toggleFollow('${uid}')">${isF?'Unfollow':'Follow'}</button><button class="btn-action" onclick="nav('dm', '${uid}')">Message</button>`;
            }
        }, e => showError("Profile error: " + e.message));
        State.listeners.prof = onSnapshot(
            query(collection(db, "posts"), where("uid", "==", uid), orderBy("createdAt", "desc")),
            s => drawFeed(s, 'u-feed'),
            e => showError("Profile feed error: " + e.message)
        );
    }

    window.editUsernamePrompt = async () => {
        const newName = prompt("Enter new username:").toLowerCase().trim();
        if(newName) await updateDoc(doc(db, "users", auth.currentUser.uid), { username: newName });
    };

    window.searchUsers = async (v) => {
        const mount = document.getElementById('search-mount');
        if(!v.trim()) { mount.innerHTML = ""; return; }
        const term = v.toLowerCase().trim();
        try {
            const s = await getDocs(collection(db, "users"));
            const matched = s.docs.filter(d => (d.data().username || '').toLowerCase().includes(term));
            mount.innerHTML = matched.map(d => {
                const u = d.data();
                return `<div class="glass-card clickable" onclick="nav('profile', '${d.id}')" style="display:flex; align-items:center; gap:15px;">
                    <img src="${u.avatar || State.defaultPic}" class="avatar">
                    <span class="username-row"><b>@${u.username}</b>${u.verified?verifiedHTML:''}</span>
                </div>`;
            }).join('') || `<div class="glass-card" style="text-align:center; color:var(--subtext);">No users found.</div>`;
        } catch(e) { showError("Search failed: " + e.message); }
    };

    window.openRelationModal = async (type) => {
        const modal = document.getElementById('modal-list'), body = document.getElementById('modal-body');
        document.getElementById('modal-title').innerText = type === 'followers' ? 'Followers' : 'Following';
        body.innerHTML = "Loading...";
        modal.style.display = "flex";
        let users = [];
        try {
            if(type === 'following') {
                const s = await getDocs(collection(db, "users", State.activeProfileId, "following"));
                for(const d of s.docs) {
                    const uSnap = await getDoc(doc(db, "users", d.id));
                    if(uSnap.exists()) users.push({ id: d.id, ...uSnap.data() });
                }
            } else {
                const s = await getDocs(collection(db, "users", State.activeProfileId, "followers"));
                for(const d of s.docs) {
                    const uSnap = await getDoc(doc(db, "users", d.id));
                    if(uSnap.exists()) users.push({ id: d.id, ...uSnap.data() });
                }
            }
        } catch(e) { showError("Could not load users: " + e.message); }
        body.innerHTML = users.length
            ? users.map(u => `<div class="clickable" style="display:flex; align-items:center; gap:12px; margin-bottom:15px;" onclick="closeModal(); nav('profile','${u.id}')">
                <img src="${u.avatar || State.defaultPic}" class="avatar" style="width:35px; height:35px;">
                <span class="username-row"><b>@${u.username}</b>${u.verified?verifiedHTML:''}</span>
              </div>`).join('')
            : `<p style="color:var(--subtext); text-align:center;">No ${type} yet.</p>`;
    };

    // ============================================================
    // ADMIN PANEL
    // ============================================================
    async function loadAdminPanel() {
        if (!State.isAdmin) { showError("Access denied."); nav('home'); return; }
        const mount = document.getElementById('admin-users-mount');
        mount.innerHTML = "Loading users...";
        try {
            const s = await getDocs(collection(db, "users"));
            State.allAdminUsers = s.docs.map(d => ({ id: d.id, ...d.data() }));
            renderAdminUsers(State.allAdminUsers);
        } catch(e) { showError("Admin load failed: " + e.message); }
    }

    function renderAdminUsers(users) {
        const mount = document.getElementById('admin-users-mount');
        if (!users.length) { mount.innerHTML = `<p style="color:var(--subtext)">No users found.</p>`; return; }
        mount.innerHTML = users.map(u => `
            <div class="admin-user-row" id="admin-row-${u.id}">
                <img src="${u.avatar || State.defaultPic}" class="avatar" style="width:38px;height:38px;flex-shrink:0;">
                <div style="flex:1; min-width:0;">
                    <div class="username-row" style="font-weight:700; font-size:14px;">
                        @${u.username}${u.verified?verifiedHTML:''}${u.isAdmin?'<span class="admin-badge">ADMIN</span>':''}
                    </div>
                    <div style="font-size:11px; color:var(--subtext); margin-top:2px;">${u.id.substring(0,16)}...</div>
                </div>
                <div class="admin-controls">
                    <button class="admin-btn admin-btn-verify ${u.verified?'active':''}" onclick="adminToggleVerify('${u.id}', ${u.verified||false})" title="${u.verified?'Remove verify':'Verify'}">
                        ${u.verified ? '✓ Verified' : '☐ Verify'}
                    </button>
                    <button class="admin-btn admin-btn-ban ${u.banned?'active':''}" onclick="adminToggleBan('${u.id}', ${u.banned||false})" title="${u.banned?'Unban':'Ban'}">
                        ${u.banned ? '🔓 Unban' : '🔒 Ban'}
                    </button>
                    <button class="admin-btn admin-btn-makeadmin ${u.isAdmin?'active':''}" onclick="adminToggleAdmin('${u.id}', ${u.isAdmin||false})" title="${u.isAdmin?'Remove admin':'Make admin'}">
                        ${u.isAdmin ? '👑 Admin' : '👑'}
                    </button>
                </div>
            </div>
        `).join('');
    }

    window.filterAdminUsers = (v) => {
        if (!v.trim()) { renderAdminUsers(State.allAdminUsers); return; }
        const term = v.toLowerCase();
        renderAdminUsers(State.allAdminUsers.filter(u => (u.username||'').toLowerCase().includes(term)));
    };

    // Toggle verified checkmark
    window.adminToggleVerify = async (uid, isVerified) => {
        if (!State.isAdmin) return;
        try {
            await updateDoc(doc(db, "users", uid), { verified: !isVerified });
            // Update local state
            const u = State.allAdminUsers.find(u => u.id === uid);
            if (u) u.verified = !isVerified;
            showSuccess(isVerified ? "Verification removed." : "User verified ✓");
            // Refresh just that row
            const term = document.getElementById('admin-search').value;
            filterAdminUsers(term);
        } catch(e) { showError("Failed: " + e.message); }
    };

    // Toggle ban
    window.adminToggleBan = async (uid, isBanned) => {
        if (!State.isAdmin) return;
        if (uid === auth.currentUser.uid) { showError("You cannot ban yourself."); return; }
        try {
            await updateDoc(doc(db, "users", uid), { banned: !isBanned });
            const u = State.allAdminUsers.find(u => u.id === uid);
            if (u) u.banned = !isBanned;
            showSuccess(isBanned ? "User unbanned." : "User banned.");
            const term = document.getElementById('admin-search').value;
            filterAdminUsers(term);
        } catch(e) { showError("Failed: " + e.message); }
    };

    // Toggle admin
    window.adminToggleAdmin = async (uid, isAdm) => {
        if (!State.isAdmin) return;
        if (uid === auth.currentUser.uid) { showError("You cannot change your own admin status."); return; }
        try {
            await updateDoc(doc(db, "users", uid), { isAdmin: !isAdm });
            const u = State.allAdminUsers.find(u => u.id === uid);
            if (u) u.isAdmin = !isAdm;
            showSuccess(isAdm ? "Admin removed." : "Admin granted.");
            const term = document.getElementById('admin-search').value;
            filterAdminUsers(term);
        } catch(e) { showError("Failed: " + e.message); }
    };

    // --- SYSTEM ---
    window.closeModal = () => document.getElementById('modal-list').style.display = 'none';
    const loadGlobalFeed = () => State.listeners.feed = onSnapshot(
        query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(25)),
        s => drawFeed(s, 'feed-mount'),
        e => showError("Feed error: " + e.message)
    );
    const loadInbox = () => State.listeners.inbox = onSnapshot(
        query(collection(db, "users", auth.currentUser.uid, "conversations"), orderBy("lastSeen", "desc")),
        s => { document.getElementById('inbox-mount').innerHTML = s.docs.map(d => `<div class="glass-card clickable" onclick="nav('dm', '${d.id}')" style="display:flex; align-items:center; gap:15px;"><img src="${d.data().avatar || State.defaultPic}" class="avatar"><div><b>@${d.data().username}</b><div style="font-size:12px; opacity:0.6;">${d.data().lastMsg}</div></div></div>`).join(''); },
        e => showError("Inbox error: " + e.message)
    );
    window.toggleFollow = async (id) => {
        const me = auth.currentUser.uid, isF = State.following.includes(id);
        try {
            if(isF) {
                await deleteDoc(doc(db, "users", me, "following", id));
                await deleteDoc(doc(db, "users", id, "followers", me));
                await updateDoc(doc(db, "users", me), { followingCount: increment(-1) });
                await updateDoc(doc(db, "users", id), { followersCount: increment(-1) });
            } else {
                await setDoc(doc(db, "users", me, "following", id), { active: true });
                await setDoc(doc(db, "users", id, "followers", me), { active: true });
                await updateDoc(doc(db, "users", me), { followingCount: increment(1) });
                await updateDoc(doc(db, "users", id), { followersCount: increment(1) });
            }
        } catch(e) { showError("Follow failed: " + e.message); }
    };
    window.uploadAvatar = () => { const f = document.getElementById('up-av').files[0]; if(!f) return; const rd = new FileReader(); rd.onload = async () => { try { await updateDoc(doc(db, "users", auth.currentUser.uid), { avatar: rd.result }); nav('profile'); } catch(e) { showError("Avatar upload failed: " + e.message); } }; rd.readAsDataURL(f); };
    window.handleAuth = async () => {
        const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
        try {
            if(State.isLoginMode) {
                await signInWithEmailAndPassword(auth, e, p);
            } else {
                const n = document.getElementById('auth-nick').value.toLowerCase().trim();
                if(!n) { alert("Please enter a username"); return; }
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await setDoc(doc(db, "users", res.user.uid), { username: n, avatar: '', followersCount: 0, followingCount: 0, postsCount: 0, online: true, verified: false, banned: false, isAdmin: false });
            }
        } catch(e) { alert(e.message); }
    };
    window.toggleAuth = () => { State.isLoginMode = !State.isLoginMode; document.getElementById('signup-fields').classList.toggle('hidden', State.isLoginMode); };
    window.logout = async () => {
        if(auth.currentUser) { try { await updateDoc(doc(db, "users", auth.currentUser.uid), { online: false }); } catch(e) {} }
        signOut(auth);
    };
</script>
</body>
</html>
