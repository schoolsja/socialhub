<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050810">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HUB">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/149/149071.png">
    <style>
        /* ═══════════════════════════════════════════
           DESIGN SYSTEM — Liquid Glass 2.0
           Deep navy cosmos + chromatic glass surfaces
           ═══════════════════════════════════════════ */
        :root {
            /* Core palette */
            --bg:        #050810;
            --bg-mid:    #080c18;
            --bg-top:    #0c1020;

            /* Glass surfaces */
            --glass-1:   rgba(255,255,255,0.035);
            --glass-2:   rgba(255,255,255,0.06);
            --glass-3:   rgba(255,255,255,0.09);
            --glass-border:       rgba(255,255,255,0.08);
            --glass-border-hi:    rgba(255,255,255,0.15);
            --glass-border-glow:  rgba(99,179,237,0.3);

            /* Brand */
            --blue:      #63b3ed;
            --blue-deep: #3b82f6;
            --purple:    #b794f4;
            --pink:      #f687b3;
            --teal:      #4fd1c5;
            --green:     #68d391;

            /* Glow & accent */
            --glow-blue:   rgba(99,179,237,0.18);
            --glow-purple: rgba(183,148,244,0.15);
            --glow-pink:   rgba(246,135,179,0.12);

            /* Text */
            --text:    #eef2ff;
            --text-2:  #a0aec0;
            --text-3:  #4a5568;

            /* State */
            --danger:  #fc8181;
            --success: #68d391;
            --verified: var(--blue);

            /* Admin */
            --admin-surface: rgba(183,148,244,0.07);
            --admin-border:  rgba(183,148,244,0.18);

            /* Timing */
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --t-fast: 0.15s;
            --t-med:  0.25s;
            --t-slow: 0.4s;

            /* Shape */
            --r-sm:  10px;
            --r-md:  16px;
            --r-lg:  22px;
            --r-xl:  28px;
            --r-pill: 100px;
        }

        /* ── RESET ── */
        *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-weight: 400;
            overflow-x: hidden;
            line-height: 1.6;
            min-height: 100dvh;
        }

        /* ── AMBIENT MESH BACKGROUND ── */
        .bg-mesh {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
        }
        .bg-mesh::before {
            content: '';
            position: absolute;
            width: 70vw; height: 70vw; max-width: 700px; max-height: 700px;
            background: radial-gradient(ellipse, rgba(59,130,246,0.12) 0%, transparent 65%);
            top: -20%; left: -15%;
            animation: drift1 18s var(--ease) infinite alternate;
        }
        .bg-mesh::after {
            content: '';
            position: absolute;
            width: 60vw; height: 60vw; max-width: 600px; max-height: 600px;
            background: radial-gradient(ellipse, rgba(167,139,250,0.1) 0%, transparent 65%);
            bottom: -10%; right: -10%;
            animation: drift2 22s var(--ease) infinite alternate;
        }
        @keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(6%,8%) scale(1.08); } }
        @keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-5%,-7%) scale(1.05); } }

        /* ── LAYOUT ── */
        #app-main, #auth-screen { position: relative; z-index: 1; }

        .view-section {
            display: none; opacity: 0;
            transform: translateY(6px);
            transition: opacity var(--t-med) var(--ease), transform var(--t-med) var(--ease);
        }
        .view-section.active { display: block; opacity: 1; transform: translateY(0); }

        .container {
            width: 92%; max-width: 560px;
            margin: 0 auto;
            padding: 14px 0 108px;
        }

        /* ── HEADER ── */
        header {
            position: sticky; top: 0; z-index: 500;
            padding: 12px 18px;
            background: rgba(5,8,16,0.75);
            backdrop-filter: blur(32px) saturate(200%);
            -webkit-backdrop-filter: blur(32px) saturate(200%);
            border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 21px; font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(110deg, var(--text) 20%, var(--blue) 60%, var(--purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-right { display: flex; align-items: center; gap: 8px; }

        .btn-admin {
            font-family: 'Outfit', sans-serif;
            font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
            text-transform: uppercase;
            color: white; border: none; cursor: pointer;
            padding: 6px 14px; border-radius: var(--r-pill);
            background: linear-gradient(135deg, var(--purple), #7c3aed);
            box-shadow: 0 4px 16px rgba(124,58,237,0.35);
            transition: all var(--t-fast) var(--ease);
        }
        .btn-admin:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,58,237,0.45); }

        .btn-logout {
            font-family: 'Outfit', sans-serif;
            font-size: 12px; font-weight: 600;
            color: var(--text-2); background: var(--glass-1);
            border: 1px solid var(--glass-border);
            padding: 6px 14px; border-radius: var(--r-pill);
            cursor: pointer; transition: all var(--t-fast) var(--ease);
        }
        .btn-logout:hover { color: var(--text); background: var(--glass-2); border-color: var(--glass-border-hi); }

        /* ── NAV BAR ── */
        .nav-bar {
            position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
            background: rgba(8,12,24,0.88);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            padding: 5px 6px;
            border-radius: var(--r-pill);
            display: flex; gap: 3px;
            border: 1px solid var(--glass-border-hi);
            z-index: 1000;
            box-shadow: 0 24px 64px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .nav-btn {
            width: 44px; height: 44px; border-radius: 50%;
            border: none; background: transparent;
            color: var(--text-3); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 17px; transition: all var(--t-fast) var(--ease);
        }
        .nav-btn:hover { color: var(--text-2); background: var(--glass-1); }
        .nav-btn.active {
            color: white;
            background: linear-gradient(135deg, var(--blue-deep), var(--purple));
            box-shadow: 0 4px 16px var(--glow-blue);
        }

        /* ── GLASS CARD BASE ── */
        .glass-card {
            background: var(--glass-1);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-lg);
            padding: 18px;
            margin-bottom: 10px;
            transition: border-color var(--t-fast) var(--ease), background var(--t-fast) var(--ease);
            position: relative;
            overflow: hidden;
        }
        .glass-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-border-hi), transparent);
        }
        .glass-card:hover { border-color: var(--glass-border-hi); background: var(--glass-2); }

        /* ── POST CARD ── */
        .post-card {
            background: var(--glass-1);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-lg);
            padding: 16px 18px;
            margin-bottom: 10px;
            transition: border-color var(--t-fast) var(--ease);
            position: relative; overflow: hidden;
        }
        .post-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }
        .post-card:hover { border-color: var(--glass-border-hi); }

        .post-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .post-author { display: flex; align-items: center; gap: 11px; cursor: pointer; }
        .post-meta { display: flex; flex-direction: column; gap: 1px; }
        .post-username { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 3px; }
        .post-time { font-size: 11px; color: var(--text-3); }
        .post-body { font-size: 14px; line-height: 1.7; white-space: pre-wrap; margin-bottom: 4px; color: var(--text); }
        .post-footer {
            display: flex; align-items: center; gap: 4px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.04);
            margin-top: 12px;
        }
        .like-btn {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 13px; font-weight: 600;
            color: var(--text-3); cursor: pointer;
            padding: 6px 12px; border-radius: var(--r-pill);
            background: transparent;
            border: 1px solid transparent;
            transition: all var(--t-fast) var(--ease);
        }
        .like-btn:hover { background: var(--glass-2); border-color: var(--glass-border); color: var(--text); }
        .like-btn.liked { color: var(--blue); border-color: rgba(99,179,237,0.25); background: rgba(99,179,237,0.08); }

        .del-btn {
            margin-left: auto;
            background: rgba(252,129,129,0.08);
            border: 1px solid rgba(252,129,129,0.2);
            color: var(--danger); cursor: pointer;
            border-radius: var(--r-sm); padding: 5px 10px;
            font-size: 12px; transition: all var(--t-fast) var(--ease);
        }
        .del-btn:hover { background: rgba(252,129,129,0.15); }

        /* ── COMMENTS ── */
        .comments-section { margin-top: 4px; }
        .comment-item {
            font-size: 12.5px; padding: 8px 0;
            border-top: 1px solid rgba(255,255,255,0.04);
            display: flex; flex-direction: column; gap: 4px;
        }
        .comment-body { line-height: 1.5; }
        .comment-actions { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-3); }
        .comment-input-row { display: flex; gap: 7px; margin-top: 12px; }
        .comment-input-row input { font-size: 13px; padding: 8px 13px; border-radius: var(--r-pill); }
        .comment-input-row .btn-xs { font-size: 12px; padding: 8px 14px; border-radius: var(--r-pill); white-space: nowrap; }

        /* ── POST COMPOSER ── */
        .composer {
            background: var(--glass-1);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-xl);
            padding: 16px 18px;
            margin-bottom: 12px;
            position: relative; overflow: hidden;
        }
        .composer::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
        }
        .composer textarea {
            background: transparent; border: none;
            font-size: 14px; color: var(--text);
            resize: none; padding: 0; min-height: 60px;
            box-shadow: none !important;
        }
        .composer-bar {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 12px; padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .media-pill {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 12px; font-weight: 600; color: var(--text-2);
            background: var(--glass-2); border: 1px solid var(--glass-border);
            padding: 6px 13px; border-radius: var(--r-pill);
            cursor: pointer; transition: all var(--t-fast) var(--ease);
        }
        .media-pill:hover { background: var(--glass-3); color: var(--text); border-color: var(--glass-border-hi); }

        /* ── BUTTONS ── */
        .btn-action {
            font-family: 'Outfit', sans-serif;
            font-size: 13px; font-weight: 700;
            color: white; border: none; cursor: pointer;
            padding: 10px 20px; border-radius: var(--r-pill);
            background: linear-gradient(135deg, var(--blue-deep) 0%, var(--purple) 100%);
            box-shadow: 0 4px 18px rgba(59,130,246,0.3);
            display: inline-flex; align-items: center; gap: 6px;
            transition: all var(--t-fast) var(--ease);
            white-space: nowrap;
        }
        .btn-action:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(59,130,246,0.4); }
        .btn-action:active { transform: translateY(0); }
        .btn-action:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        /* ── INPUTS ── */
        input, textarea {
            width: 100%;
            font-family: 'Outfit', sans-serif;
            font-size: 14px; font-weight: 400;
            color: var(--text);
            background: var(--glass-1);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-md);
            padding: 12px 16px;
            transition: all var(--t-fast) var(--ease);
        }
        input::placeholder, textarea::placeholder { color: var(--text-3); }
        input:focus, textarea:focus {
            border-color: var(--glass-border-glow);
            background: rgba(99,179,237,0.05);
            box-shadow: 0 0 0 3px rgba(99,179,237,0.1), inset 0 0 0 1px rgba(99,179,237,0.1);
        }

        /* ── AVATAR ── */
        .avatar {
            width: 40px; height: 40px; border-radius: 50%;
            object-fit: cover; background: var(--bg-mid);
            border: 1.5px solid var(--glass-border-hi);
            flex-shrink: 0;
        }
        .avatar-lg {
            width: 84px; height: 84px; border-radius: 26px;
            object-fit: cover; background: var(--bg-mid);
            border: 2px solid var(--glass-border-hi);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        /* ── POST MEDIA ── */
        .post-media {
            width: 100%; border-radius: var(--r-md);
            margin-top: 12px; max-height: 400px;
            object-fit: cover;
            border: 1px solid var(--glass-border);
        }

        /* ── STATUS ── */
        .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; flex-shrink: 0; }
        .online { background: var(--green); box-shadow: 0 0 7px var(--green); }
        .offline { background: var(--text-3); }

        /* ── VERIFIED BADGE ── */
        .verified-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 15px; height: 15px;
            background: linear-gradient(135deg, var(--blue), var(--teal));
            border-radius: 50%; margin-left: 3px; flex-shrink: 0;
            box-shadow: 0 0 8px rgba(99,179,237,0.55);
        }
        .verified-badge svg { width: 9px; height: 9px; fill: white; }

        /* ── USERNAME ROW ── */
        .username-row { display: inline-flex; align-items: center; gap: 2px; }

        /* ── TIMESTAMPS ── */
        .ts { font-size: 10.5px; color: var(--text-3); }
        .msg-time { font-size: 9.5px; opacity: 0.5; margin-top: 4px; display: block; }

        /* ── CHAT ── */
        .chat-wrap {
            background: var(--glass-1);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-xl);
            padding: 16px 18px;
            position: relative; overflow: hidden;
        }
        .chat-wrap::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }
        .chat-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; color: var(--text); }

        .chat-scroll {
            height: 360px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 6px;
            padding-right: 2px; scroll-behavior: smooth;
        }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

        .msg-pop { padding: 9px 14px; border-radius: 16px; max-width: 76%; font-size: 13.5px; line-height: 1.45; }
        .msg-sent {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--blue-deep), var(--purple));
            color: white; border-bottom-right-radius: 4px;
        }
        .msg-rec {
            align-self: flex-start;
            background: var(--glass-2);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        .chat-input-row { display: flex; gap: 8px; margin-top: 12px; }
        .chat-input-row input { border-radius: var(--r-pill); padding: 10px 18px; }
        .chat-input-row .btn-action { border-radius: var(--r-pill); padding: 10px 20px; }

        .typing-label { font-size: 10.5px; color: var(--blue); margin-top: 2px; display: none; }

        /* ── DM VIEW ── */
        .dm-wrap {
            background: var(--glass-1);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-xl);
            padding: 16px 18px; overflow: hidden;
            position: relative;
        }
        .dm-wrap::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }
        .dm-header {
            display: flex; align-items: center; gap: 11px;
            margin-bottom: 14px; padding-bottom: 14px;
            border-bottom: 1px solid var(--glass-border);
        }
        .back-btn {
            width: 34px; height: 34px; border-radius: var(--r-sm);
            background: var(--glass-2); border: 1px solid var(--glass-border);
            color: var(--blue); cursor: pointer; font-size: 15px;
            display: flex; align-items: center; justify-content: center;
            transition: all var(--t-fast) var(--ease); flex-shrink: 0;
        }
        .back-btn:hover { background: var(--glass-3); }

        /* ── INBOX ── */
        .inbox-item {
            display: flex; align-items: center; gap: 12px;
            padding: 13px 15px;
            background: var(--glass-1);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-md);
            margin-bottom: 8px; cursor: pointer;
            transition: all var(--t-fast) var(--ease);
            position: relative; overflow: hidden;
        }
        .inbox-item::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, transparent, rgba(99,179,237,0.03));
            opacity: 0; transition: opacity var(--t-fast) var(--ease);
        }
        .inbox-item:hover { border-color: var(--glass-border-hi); background: var(--glass-2); }
        .inbox-item:hover::before { opacity: 1; }
        .inbox-text { flex: 1; min-width: 0; }
        .inbox-name { font-weight: 700; font-size: 13.5px; display: flex; align-items: center; gap: 3px; margin-bottom: 2px; }
        .inbox-preview { font-size: 12px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ── SEARCH RESULT ── */
        .search-result {
            display: flex; align-items: center; gap: 12px;
            padding: 13px 15px;
            background: var(--glass-1);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-md);
            margin-bottom: 8px; cursor: pointer;
            transition: all var(--t-fast) var(--ease);
        }
        .search-result:hover { border-color: var(--glass-border-hi); background: var(--glass-2); }

        /* ── PROFILE ── */
        .profile-card {
            background: var(--glass-1);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-xl);
            margin-bottom: 10px;
            overflow: hidden;
            position: relative;
        }
        .profile-banner {
            height: 90px;
            background: linear-gradient(135deg, rgba(59,130,246,0.2) 0%, rgba(167,139,250,0.2) 50%, rgba(246,135,179,0.1) 100%);
            position: relative;
        }
        .profile-banner::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 40%, var(--bg) 100%);
        }
        .profile-body { padding: 0 18px 20px; text-align: center; }
        .profile-avatar-wrap {
            margin-top: -42px; margin-bottom: 10px;
            display: flex; justify-content: center;
            position: relative; z-index: 1;
        }
        .profile-username {
            font-size: 20px; font-weight: 800;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            letter-spacing: -0.3px;
        }
        .profile-status { font-size: 11.5px; color: var(--text-3); margin: 4px 0 14px; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .profile-actions { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
        .profile-stats {
            display: flex; justify-content: center; gap: 0;
            border-top: 1px solid var(--glass-border);
            padding-top: 16px;
        }
        .stat { flex: 1; text-align: center; cursor: pointer; transition: opacity var(--t-fast); }
        .stat:hover { opacity: 0.7; }
        .stat b { display: block; font-size: 19px; font-weight: 800; letter-spacing: -0.5px; }
        .stat small { font-size: 10.5px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500; }
        .stat + .stat { border-left: 1px solid var(--glass-border); }

        /* ── AUTH ── */
        #auth-screen {
            min-height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .auth-box {
            width: 100%; max-width: 350px;
            background: rgba(8,12,24,0.92);
            border: 1px solid var(--glass-border-hi);
            border-radius: var(--r-xl);
            padding: 32px 26px;
            backdrop-filter: blur(24px);
            box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.07);
            text-align: center;
        }

<!-- ── MODAL ── -->

                    oninput="filterAdminUsers(this.value)"
                    style="border-radius:var(--r-pill); padding:10px 18px; margin-bottom:14px;">

    </div>

    <nav class="nav-bar">
        <button class="nav-btn active" id="n-home"    onclick="nav('home')"    title="Home">🏠</button>

        <button class="nav-btn"        id="n-chat"    onclick="nav('chat')"    title="Chat">💬</button>
        <button class="nav-btn"        id="n-inbox"   onclick="nav('inbox')"   title="Inbox">✉️</button>
        <button class="nav-btn"        id="n-profile" onclick="nav('profile')" title="Profile">👤</button>

<!-- CONFIRM DELETE SHEET -->
<div id="confirm-sheet" style="display:none;">
    <div class="confirm-inner">
        <div class="confirm-handle"></div>
        <div class="confirm-title" id="confirm-title">Delete this?</div>
        <div class="confirm-sub" id="confirm-sub">This action cannot be undone.</div>

<!-- INLINE USERNAME EDITOR (placed here, moved into profile by JS) -->

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, deleteDoc, updateDoc, increment, where, getDoc, getDocs, arrayUnion, arrayRemove, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDtYOFVBuPYO_CGYz1JBjOGqJoknHvZClI",
        authDomain: "socialhub-2851f.firebaseapp.com",
        projectId: "socialhub-2851f",
        storageBucket: "socialhub-2851f.firebasestorage.app",
        messagingSenderId: "38201819416",
        appId: "1:38201819416:web:db2997ca5377ac71a29e6d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const State = {
        listeners: {}, following: [], isLoginMode: true,
        activeChatId: null, activeProfileId: null,
        defaultPic: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
        typingTimeout: null, isAdmin: false, currentUserData: null,
        allAdminUsers: []
    };
    const kill = (k) => { if(State.listeners[k]) { State.listeners[k](); delete State.listeners[k]; } };

    // --- VERIFIED BADGE HTML ---
    const verifiedHTML = `<span class="verified-badge" title="Verified"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>`;

    // --- TIMESTAMP FORMATTER ---
    const fmtTime = (ts) => {
        if (!ts) return '';
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        const now = new Date();
        const diff = now - d;
        const mins = Math.floor(diff / 60000);
        const hrs = Math.floor(diff / 3600000);
        const days = Math.floor(diff / 86400000);
        if (mins < 1) return 'just now';
        if (mins < 60) return `${mins}m ago`;
        if (hrs < 24) return `${hrs}h ago`;
        if (days < 7) return `${days}d ago`;
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    };

    const showError = (msg) => {
        console.error('HUB ERROR:', msg);
        const t = document.getElementById('err-toast');
        t.innerText = '⚠️ ' + msg;
        t.style.display = 'block';
        clearTimeout(window._errTimer);
        window._errTimer = setTimeout(() => { t.style.display = 'none'; }, 6000);
    };

    const showSuccess = (msg) => {
        const t = document.getElementById('success-toast');
        t.innerText = '✅ ' + msg;
        t.style.display = 'block';
        clearTimeout(window._sucTimer);
        window._sucTimer = setTimeout(() => { t.style.display = 'none'; }, 3000);
    };

    const getUserData = async (uid) => {
        const snap = await getDoc(doc(db, "users", uid));
        if (snap.exists()) return snap.data();
        const fallback = { username: auth.currentUser?.email?.split('@')[0] || 'user', avatar: '', followersCount: 0, followingCount: 0, postsCount: 0, online: true, verified: false, banned: false, isAdmin: false };
        await setDoc(doc(db, "users", uid), fallback, { merge: true });
        return fallback;
    };

    // Check if banned and show overlay
    const checkBanned = (userData) => {
        if (userData?.banned) {
            document.getElementById('app-main').innerHTML = `
                <div class="banned-overlay">
                    <h2>🚫 Account Banned</h2>
                    <p>Your account has been banned by an administrator.<br>If you believe this is a mistake, contact support.</p>
                </div>`;
        }
    };

    onAuthStateChanged(auth, async (u) => {
        if (u) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-main').classList.remove('hidden');
            try {
                await updateDoc(doc(db, "users", u.uid), { online: true, lastSeen: serverTimestamp() });
            } catch(e) {
                await setDoc(doc(db, "users", u.uid), { online: true, lastSeen: serverTimestamp(), username: u.email.split('@')[0], avatar: '', followersCount: 0, followingCount: 0, postsCount: 0, verified: false, banned: false, isAdmin: false }, { merge: true });
            }
            // Load current user data and check admin/banned status
            const myData = await getUserData(u.uid);
            State.currentUserData = myData;
            State.isAdmin = myData?.isAdmin === true;
            checkBanned(myData);
            // Show admin button if admin
            if (State.isAdmin) {
                document.getElementById('admin-nav-btn').classList.remove('hidden');
            }
            State.listeners.me = onSnapshot(collection(db, "users", u.uid, "following"), s => { State.following = s.docs.map(d => d.id); });
            // Live-listen for banned status changes
            State.listeners.myDoc = onSnapshot(doc(db, "users", u.uid), snap => {
                if (snap.exists() && snap.data().banned) checkBanned(snap.data());
            });
            nav('home');
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('app-main').classList.add('hidden');
        }
    });

    // ── CONFIRM SHEET ──
    let _confirmCallback = null;
    const showConfirmSheet = (title, sub, onConfirm) => {
        const titleEl = document.getElementById('confirm-title');
        const subEl = document.getElementById('confirm-sub');
        const sheet = document.getElementById('confirm-sheet');
        const yesBtn = document.getElementById('confirm-yes-btn');
        if (!sheet || !yesBtn) { console.error('Confirm sheet elements missing'); return; }
        if (titleEl) titleEl.innerText = title;
        if (subEl) subEl.innerText = sub;
        _confirmCallback = onConfirm;
        sheet.style.cssText = 'display:flex !important; align-items:flex-end; justify-content:center; position:fixed; inset:0; z-index:9000; background:rgba(4,6,15,0.88); backdrop-filter:blur(12px);';
        // Clone yes button to remove any stale listeners
        const newBtn = yesBtn.cloneNode(true);
        yesBtn.parentNode.replaceChild(newBtn, newBtn);
        document.getElementById('confirm-yes-btn').onclick = async () => {
            closeConfirmSheet();
            if (_confirmCallback) await _confirmCallback();
        };
    };
    window.closeConfirmSheet = () => {
        const sheet = document.getElementById('confirm-sheet');
        sheet.style.display = 'none';
        _confirmCallback = null;
    };
    // Close sheet on background tap
    window.addEventListener('click', (e) => {
        const sheet = document.getElementById('confirm-sheet');
        if (sheet && e.target === sheet) closeConfirmSheet();
    });

    window.nav = (target, params = null) => {
        Object.keys(State.listeners).forEach(k => { if(k!=='me' && k!=='myDoc') kill(k); });
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`v-${target}`).classList.add('active');
        if(document.getElementById(`n-${target}`)) document.getElementById(`n-${target}`).classList.add('active');
        if(target === 'home') loadGlobalFeed();
        if(target === 'chat') loadGlobalChat();
        if(target === 'profile') loadUserProfile(params || auth.currentUser.uid);
        if(target === 'inbox') loadInbox();
        if(target === 'dm') openConversation(params);
        if(target === 'admin') loadAdminPanel();
        window.scrollTo(0,0);
    };

    // --- GLOBAL CHAT ---
    window.sendGlobalChat = async () => {
        const inp = document.getElementById('chat-in');
        const val = inp.value.trim();
        if(!val || !auth.currentUser) return;
        const btn = document.getElementById('chat-send-btn');
        btn.disabled = true;
        try {
            const u = await getUserData(auth.currentUser.uid);
            await addDoc(collection(db, "chats"), { uid: auth.currentUser.uid, name: u.username, text: val, createdAt: serverTimestamp() });
            inp.value = "";
        } catch(e) {
            showError("Chat send failed: " + e.message);
        } finally {
            btn.disabled = false;
        }
    };

    async function loadGlobalChat() {
        // Pre-fetch verified for chat senders
        const prefetchChat = async (docs) => {
            const uids = [...new Set(docs.map(d => d.data().uid))];
            await Promise.all(uids.map(uid => isUserVerified(uid)));
        };
        State.listeners.chat = onSnapshot(
            query(collection(db, "chats"), orderBy("createdAt", "asc"), limit(50)),
            async s => {
                await prefetchChat(s.docs);
                const b = document.getElementById('chat-mount');
                b.innerHTML = s.docs.map(d => {
                    const data = d.data();
                    const isVerified = _verifiedCache[data.uid] || false;
                    return `<div class="msg-pop ${data.uid===auth.currentUser.uid?'msg-sent':'msg-rec'}">
                        <span style="font-weight:700; font-size:12px; opacity:0.85;">${data.name}${isVerified?verifiedHTML:''}</span><br>${data.text}
                        <span class="msg-time">${fmtTime(data.createdAt)}</span>
                    </div>`;
                }).join('');
                b.scrollTop = b.scrollHeight;
            },
            e => showError("Chat load error: " + e.message)
        );
    }

    // --- TYPING & PRIVATE MESSAGES ---
    window.handleTyping = async () => {
        if(!State.activeChatId) return;
        try {
            await setDoc(doc(db, "conversations", State.activeChatId), { [auth.currentUser.uid]: true }, { merge: true });
            clearTimeout(State.typingTimeout);
            State.typingTimeout = setTimeout(async () => {
                await setDoc(doc(db, "conversations", State.activeChatId), { [auth.currentUser.uid]: false }, { merge: true });
            }, 2000);
        } catch(e) {}
    };

    async function openConversation(otherId) {
        const chatId = [auth.currentUser.uid, otherId].sort().join('_');
        State.activeChatId = chatId;
        try {
            const other = await getUserData(otherId);
            document.getElementById('dm-avatar').src = other.avatar || State.defaultPic;
            document.getElementById('dm-name').innerHTML = `@${other.username}${other.verified?verifiedHTML:''}`;
        } catch(e) { showError("Could not load user: " + e.message); }

        State.listeners.dm = onSnapshot(
            query(collection(db, "conversations", chatId, "messages"), orderBy("createdAt", "asc"), limit(50)),
            s => {
                const box = document.getElementById('dm-mount');
                box.innerHTML = s.docs.map(d => {
                    const msg = d.data();
                    return `<div class="msg-pop ${msg.uid===auth.currentUser.uid?'msg-sent':'msg-rec'}">
                        ${msg.text}<span class="msg-time">${fmtTime(msg.createdAt)}</span>
                    </div>`;
                }).join('');
                box.scrollTop = box.scrollHeight;
            },
            e => showError("DM load error: " + e.message)
        );

        State.listeners.typing = onSnapshot(doc(db, "conversations", chatId), snap => {
            if(snap.exists() && snap.data()[otherId] === true) document.getElementById('dm-typing').style.display = 'block';
            else document.getElementById('dm-typing').style.display = 'none';
        }, () => {});
    }

    window.sendDirectMessage = async () => {
        const inp = document.getElementById('dm-in');
        const val = inp.value.trim();
        if(!val || !State.activeChatId) return;
        const btn = document.getElementById('dm-send-btn');
        btn.disabled = true;
        try {
            await addDoc(collection(db, "conversations", State.activeChatId, "messages"), { uid: auth.currentUser.uid, text: val, createdAt: serverTimestamp() });
            const otherId = State.activeChatId.split('_').find(id => id !== auth.currentUser.uid);
            const me = await getUserData(auth.currentUser.uid);
            const other = await getUserData(otherId);
            const meta = { lastMsg: val, lastSeen: serverTimestamp() };
            await setDoc(doc(db, "users", otherId, "conversations", auth.currentUser.uid), { ...meta, username: me.username, avatar: me.avatar || '' }, { merge: true });
            await setDoc(doc(db, "users", auth.currentUser.uid, "conversations", otherId), { ...meta, username: other.username, avatar: other.avatar || '' }, { merge: true });
            inp.value = "";
            await setDoc(doc(db, "conversations", State.activeChatId), { [auth.currentUser.uid]: false }, { merge: true });
        } catch(e) {
            showError("DM send failed: " + e.message);
        } finally {
            btn.disabled = false;
        }
    };

    // --- FEED, LIKES, COMMENTS ---
    window.createPost = async () => {
        const txt = document.getElementById('p-text').value.trim(), file = document.getElementById('p-file').files[0];
        if(!txt && !file) return;
        const btn = document.getElementById('p-btn'); btn.disabled = true;
        try {
            const u = await getUserData(auth.currentUser.uid);
            let media = null, mType = 'none';
            if(file) {
                mType = file.type.startsWith('video') ? 'video' : 'image';
                media = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(file); });
            }
            await addDoc(collection(db, "posts"), {
                uid: auth.currentUser.uid, username: u.username, avatar: u.avatar || State.defaultPic,
                verified: u.verified || false,
                content: txt, media, mediaType: mType, likes: 0, likedBy: [], createdAt: serverTimestamp()
            });
            await updateDoc(doc(db, "users", auth.currentUser.uid), { postsCount: increment(1) });
            document.getElementById('p-text').value = ""; document.getElementById('p-file').value = "";
        } catch(e) {
            showError("Post failed: " + e.message);
        } finally { btn.disabled = false; }
    };

    // Verified status cache — avoids re-fetching same user doc on every feed render
    const _verifiedCache = {};
    const isUserVerified = async (uid) => {
        if (_verifiedCache[uid] !== undefined) return _verifiedCache[uid];
        try {
            const snap = await getDoc(doc(db, "users", uid));
            _verifiedCache[uid] = snap.exists() ? (snap.data().verified || false) : false;
        } catch(e) { _verifiedCache[uid] = false; }
        return _verifiedCache[uid];
    };

    async function drawFeed(snap, targetId) {
        const box = document.getElementById(targetId);
        if (!box) return;
        // Pre-fetch verified status for all unique authors in one pass
        const uids = [...new Set(snap.docs.map(d => d.data().uid))];
        await Promise.all(uids.map(uid => isUserVerified(uid)));

        box.innerHTML = snap.docs.map(d => {
            const p = d.data(); const id = d.id;
            const isLiked = (p.likedBy || []).includes(auth.currentUser.uid);
            const isVerified = _verifiedCache[p.uid] || false;
            return `<div class="post-card">
                <div class="post-header">
                    <div class="post-author" onclick="nav('profile','${p.uid}')">
                        <img src="${p.avatar}" class="avatar">
                        <div class="post-meta">
                            <div class="post-username"><span>@${p.username}</span>${isVerified?verifiedHTML:''}</div>
                            <div class="post-time ts">${fmtTime(p.createdAt)}</div>
                        </div>
                    </div>
                    ${p.uid === auth.currentUser.uid || State.isAdmin ? `<button class="del-btn" onclick="deletePost('${id}','${p.uid}')">🗑</button>` : ''}
                </div>
                <div class="post-body">${p.content}</div>
                ${p.media ? (p.mediaType==='video' ? `<video src="${p.media}" controls class="post-media"></video>` : `<img src="${p.media}" class="post-media">`) : ''}
                <div class="post-footer">
                    <span class="like-btn ${isLiked?'liked':''}" onclick="handleLike('${id}')">${isLiked?'❤️':'🤍'} ${p.likes||0}</span>
                </div>
                <div id="cm-mount-${id}" class="comments-section"></div>
                <div class="comment-input-row">
                    <input type="text" id="cm-in-${id}" placeholder="Add a comment…" onkeydown="if(event.key==='Enter') addComment('${id}')">
                    <button class="btn-action btn-xs" onclick="addComment('${id}')">Reply</button>
                </div>
            </div>`;
        }).join('');
        snap.docs.forEach(d => syncComments(d.id, d.data().uid));
    }

    const syncComments = (pid, postOwnerUid) => {
        kill(`cm-${pid}`);
        State.listeners[`cm-${pid}`] = onSnapshot(
            query(collection(db, "posts", pid, "comments"), orderBy("createdAt", "asc")),
            async s => {
                // Pre-fetch live verified status for all comment authors
                const uids = [...new Set(s.docs.map(d => d.data().uid))];
                await Promise.all(uids.map(uid => isUserVerified(uid)));
                const el = document.getElementById(`cm-mount-${pid}`);
                if(el) {
                    el.innerHTML = s.docs.map(d => {
                        const c = d.data(); const cid = d.id;
                        const cLiked = (c.likedBy || []).includes(auth.currentUser.uid);
                        const canDelete = c.uid === auth.currentUser.uid || postOwnerUid === auth.currentUser.uid || State.isAdmin;
                        // Use live verified from cache, not stale comment field
                        const cmtVerified = _verifiedCache[c.uid] || false;
                        return `<div class="comment-item">
                            <div class="comment-body">
                                <b class="clickable" onclick="nav('profile','${c.uid}')" style="font-weight:700;">@${c.username}${cmtVerified?verifiedHTML:''}:</b> ${c.text}
                            </div>
                            <div class="comment-actions">
                                <span class="clickable" onclick="handleCommentLike('${pid}', '${cid}')" style="color:${cLiked?'var(--blue)':'inherit'}">${cLiked?'❤️':'🤍'} ${c.likes||0}</span>
                                <span class="ts" style="margin-left:auto;">${fmtTime(c.createdAt)}</span>
                                ${canDelete ? `<button class="cm-del" onclick="deleteComment('${pid}', '${cid}', '${postOwnerUid}')">✕ Del</button>` : ''}
                            </div>
                        </div>`;
                    }).join('');
                }
            },
            e => showError("Comments error: " + e.message)
        );
    };

    window.addComment = async (pid) => {
        const inp = document.getElementById(`cm-in-${pid}`);
        if (!inp) return;
        const val = inp.value.trim();
        if(!val || !auth.currentUser) return;
        inp.disabled = true;
        try {
            const u = await getUserData(auth.currentUser.uid);
            await addDoc(collection(db, "posts", pid, "comments"), {
                uid: auth.currentUser.uid, username: u.username,
                verified: u.verified || false,
                text: val, likes: 0, likedBy: [], createdAt: serverTimestamp()
            });
            inp.value = "";
        } catch(e) {
            showError("Comment failed: " + e.message);
        } finally {
            inp.disabled = false;
            inp.focus();
        }
    };

    window.handleCommentLike = async (pid, cid) => {
        if (!auth.currentUser) return;
        try {
            const r = doc(db, "posts", pid, "comments", cid);
            const s = await getDoc(r);
            if (!s.exists()) return;
            const l = s.data().likedBy || [];
            const has = l.includes(auth.currentUser.uid);
            await updateDoc(r, { likes: increment(has ? -1 : 1), likedBy: has ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid) });
        } catch(e) { showError("Like failed: " + e.message); }
    };

    window.deleteComment = (pid, cid, postOwnerUid) => {
        if (!auth.currentUser) return;
        showConfirmSheet("Delete comment?", "This comment will be permanently removed.", async () => {
            try {
                const cRef = doc(db, "posts", pid, "comments", cid);
                kill(`cm-${pid}`);
                await deleteDoc(cRef);
                syncComments(pid, postOwnerUid);
                showSuccess("Comment deleted.");
            } catch(e) { showError("Delete failed: " + e.message); }
        });
    };

    window.handleLike = async (id) => {
        if (!auth.currentUser) return;
        try {
            const r = doc(db, "posts", id);
            const s = await getDoc(r);
            if (!s.exists()) return;
            const l = s.data().likedBy || [];
            const has = l.includes(auth.currentUser.uid);
            await updateDoc(r, { likes: increment(has ? -1 : 1), likedBy: has ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid) });
        } catch(e) { showError("Like failed: " + e.message); }
    };

    window.deletePost = (id, postOwnerUid) => {
        if (!auth.currentUser) return;
        showConfirmSheet("Delete post?", "This will permanently remove the post.", async () => {
            try {
                await deleteDoc(doc(db, "posts", id));
                await updateDoc(doc(db, "users", postOwnerUid), { postsCount: increment(-1) });
                showSuccess("Post deleted.");
            } catch(e) { showError("Delete failed: " + e.message); }
        });
    };

    // --- PROFILE & SEARCH ---
    async function loadUserProfile(uid) {
        State.activeProfileId = uid;
        State.listeners.profData = onSnapshot(doc(db, "users", uid), (uSnap) => {
            if (!uSnap.exists()) return;
            const u = uSnap.data();
            document.getElementById('u-pic').src = u.avatar || State.defaultPic;
            // Show verified badge next to username
            document.getElementById('u-nick').innerHTML = `@${u.username}${u.verified ? verifiedHTML : ''}${u.isAdmin ? '<span class="admin-badge">Admin</span>' : ''}`;
            document.getElementById('u-foll').innerText = u.followersCount || 0;
            document.getElementById('u-fing').innerText = u.followingCount || 0;
            document.getElementById('u-postcount').innerText = u.postsCount || 0;
            document.getElementById('u-status-tag').innerHTML = `<span class="status-dot ${u.online?'online':'offline'}"></span><span style="font-size:12px;">${u.online?'Online':'Offline'}</span>`;
            const acts = document.getElementById('u-actions');
            if(uid === auth.currentUser.uid) {
                acts.innerHTML = `
                    <button class="btn-action" onclick="editUsernamePrompt()" style="padding:9px 16px; font-size:12.5px;">✏️ Edit Username</button>
                    <input type="file" id="up-av" style="display:none" onchange="uploadAvatar()">
                    <button class="btn-action btn-ghost" onclick="document.getElementById('up-av').click()" style="padding:9px 16px; font-size:12.5px;">🖼 Change Avatar</button>
                `;
            } else {
                const isF = State.following.includes(uid);
                acts.innerHTML = `<button class="btn-action" onclick="toggleFollow('${uid}')">${isF?'Unfollow':'Follow'}</button><button class="btn-action" onclick="nav('dm', '${uid}')">Message</button>`;
            }
        }, e => showError("Profile error: " + e.message));
        State.listeners.prof = onSnapshot(
            query(collection(db, "posts"), where("uid", "==", uid), orderBy("createdAt", "desc")),
            s => drawFeed(s, 'u-feed'),
            e => showError("Profile feed error: " + e.message)
        );
    }

    window.editUsernamePrompt = () => {
        // Move the inline editor panel into the profile actions area and open it
        const panel = document.getElementById('username-edit-panel');
        const acts = document.getElementById('u-actions');
        if (acts && !acts.contains(panel)) acts.appendChild(panel);
        const inp = document.getElementById('username-edit-input');
        // Pre-fill with current username
        const currentNick = document.getElementById('u-nick').innerText.replace('@','').replace(/\s.*/,'').trim();
        inp.value = currentNick;
        panel.classList.add('open');
        setTimeout(() => inp.focus(), 50);
    };

    window.closeUsernameEdit = () => {
        document.getElementById('username-edit-panel').classList.remove('open');
    };

    window.saveUsernameInline = async () => {
        const inp = document.getElementById('username-edit-input');
        const newName = inp.value.toLowerCase().replace(/[^a-z0-9_]/g, '').trim();
        if (!newName) { showError("Username can't be empty."); return; }
        if (newName.length < 2) { showError("Username too short."); return; }
        try {
            await updateDoc(doc(db, "users", auth.currentUser.uid), { username: newName });
            closeUsernameEdit();
            showSuccess("Username updated!");
        } catch(e) { showError("Failed: " + e.message); }
    };

    window.searchUsers = async (v) => {
        const mount = document.getElementById('search-mount');
        if(!v.trim()) { mount.innerHTML = ""; return; }
        const term = v.toLowerCase().trim();
        try {
            const s = await getDocs(collection(db, "users"));
            const matched = s.docs.filter(d => (d.data().username || '').toLowerCase().includes(term));
            mount.innerHTML = matched.map(d => {
                const u = d.data();
                return `<div class="search-result" onclick="nav('profile', '${d.id}')">
                    <img src="${u.avatar || State.defaultPic}" class="avatar">
                    <div>
                        <div class="username-row" style="font-weight:700; font-size:13.5px;"><span>@${u.username}</span>${u.verified?verifiedHTML:''}</div>
                        <div style="font-size:11px; color:var(--text-3); margin-top:2px;">${u.followersCount||0} followers</div>
                    </div>
                </div>`;
            }).join('') || `<div style="text-align:center; color:var(--text-3); padding:32px 0; font-size:14px;">No users found</div>`;
        } catch(e) { showError("Search failed: " + e.message); }
    };

    window.openRelationModal = async (type) => {
        const modal = document.getElementById('modal-list'), body = document.getElementById('modal-body');
        document.getElementById('modal-title').innerText = type === 'followers' ? 'Followers' : 'Following';
        body.innerHTML = "Loading...";
        modal.style.display = "flex";
        let users = [];
        try {
            if(type === 'following') {
                const s = await getDocs(collection(db, "users", State.activeProfileId, "following"));
                for(const d of s.docs) {
                    const uSnap = await getDoc(doc(db, "users", d.id));
                    if(uSnap.exists()) users.push({ id: d.id, ...uSnap.data() });
                }
            } else {
                const s = await getDocs(collection(db, "users", State.activeProfileId, "followers"));
                for(const d of s.docs) {
                    const uSnap = await getDoc(doc(db, "users", d.id));
                    if(uSnap.exists()) users.push({ id: d.id, ...uSnap.data() });
                }
            }
        } catch(e) { showError("Could not load users: " + e.message); }
        body.innerHTML = users.length
            ? users.map(u => `<div onclick="closeModal(); nav('profile','${u.id}')" style="display:flex; align-items:center; gap:12px; margin-bottom:10px; cursor:pointer; padding:10px; border-radius:var(--r-md); border:1px solid transparent; transition:all 0.15s;" onmouseover="this.style.background='var(--glass-2)';this.style.borderColor='var(--glass-border-hi)'" onmouseout="this.style.background='transparent';this.style.borderColor='transparent'">
                <img src="${u.avatar || State.defaultPic}" class="avatar">
                <div>
                    <div class="username-row" style="font-weight:700; font-size:13.5px;"><span>@${u.username}</span>${u.verified?verifiedHTML:''}</div>
                    <div style="font-size:11px; color:var(--text-3); margin-top:2px;">${u.followersCount||0} followers</div>
                </div>
              </div>`).join('')
            : `<p style="color:var(--text-3); text-align:center; padding:24px 0; font-size:14px;">No ${type} yet.</p>`;
    };

    // ============================================================
    // ADMIN PANEL
    // ============================================================
    async function loadAdminPanel() {
        if (!State.isAdmin) { showError("Access denied."); nav('home'); return; }
        const mount = document.getElementById('admin-users-mount');
        mount.innerHTML = "Loading users...";
        try {
            const s = await getDocs(collection(db, "users"));
            State.allAdminUsers = s.docs.map(d => ({ id: d.id, ...d.data() }));
            renderAdminUsers(State.allAdminUsers);
        } catch(e) { showError("Admin load failed: " + e.message); }
    }

    function renderAdminUsers(users) {
        const mount = document.getElementById('admin-users-mount');
        if (!users.length) { mount.innerHTML = `<p style="color:var(--subtext)">No users found.</p>`; return; }
        mount.innerHTML = users.map(u => `
            <div class="admin-user-row" id="admin-row-${u.id}">
                <img src="${u.avatar || State.defaultPic}" class="avatar" style="flex-shrink:0;">
                <div class="admin-user-info">
                    <div class="admin-user-name">
                        <span>@${u.username}</span>${u.verified?verifiedHTML:''}${u.isAdmin?'<span class="admin-badge">Admin</span>':''}
                    </div>
                    <div class="admin-user-id">${u.id.substring(0,18)}…</div>
                </div>
                <div class="admin-controls">
                    <button class="admin-btn admin-btn-verify ${u.verified?'active':''}" onclick="adminToggleVerify('${u.id}', ${u.verified||false})">
                        ${u.verified ? '✓ Verified' : 'Verify'}
                    </button>
                    <button class="admin-btn admin-btn-ban ${u.banned?'active':''}" onclick="adminToggleBan('${u.id}', ${u.banned||false})">
                        ${u.banned ? 'Unban' : 'Ban'}
                    </button>
                    <button class="admin-btn admin-btn-makeadmin ${u.isAdmin?'active':''}" onclick="adminToggleAdmin('${u.id}', ${u.isAdmin||false})">
                        ${u.isAdmin ? '👑 Admin' : '👑'}
                    </button>
                </div>
            </div>
        `).join('');
    }

    window.filterAdminUsers = (v) => {
        if (!v.trim()) { renderAdminUsers(State.allAdminUsers); return; }
        const term = v.toLowerCase();
        renderAdminUsers(State.allAdminUsers.filter(u => (u.username||'').toLowerCase().includes(term)));
    };

    // Toggle verified checkmark
    window.adminToggleVerify = async (uid, isVerified) => {
        if (!State.isAdmin) return;
        try {
            await updateDoc(doc(db, "users", uid), { verified: !isVerified });
            // Clear verified cache so feed/search/profile show updated badge instantly
            delete _verifiedCache[uid];
            // Update local admin list state
            const u = State.allAdminUsers.find(u => u.id === uid);
            if (u) u.verified = !isVerified;
            showSuccess(isVerified ? "Verification removed." : "User verified ✓");
            // Refresh admin panel row
            const term = document.getElementById('admin-search').value;
            filterAdminUsers(term);
        } catch(e) { showError("Failed: " + e.message); }
    };

    // Toggle ban
    window.adminToggleBan = async (uid, isBanned) => {
        if (!State.isAdmin) return;
        if (uid === auth.currentUser.uid) { showError("You cannot ban yourself."); return; }
        try {
            await updateDoc(doc(db, "users", uid), { banned: !isBanned });
            const u = State.allAdminUsers.find(u => u.id === uid);
            if (u) u.banned = !isBanned;
            showSuccess(isBanned ? "User unbanned." : "User banned.");
            const term = document.getElementById('admin-search').value;
            filterAdminUsers(term);
        } catch(e) { showError("Failed: " + e.message); }
    };

    // Toggle admin
    window.adminToggleAdmin = async (uid, isAdm) => {
        if (!State.isAdmin) return;
        if (uid === auth.currentUser.uid) { showError("You cannot change your own admin status."); return; }
        try {
            await updateDoc(doc(db, "users", uid), { isAdmin: !isAdm });
            const u = State.allAdminUsers.find(u => u.id === uid);
            if (u) u.isAdmin = !isAdm;
            showSuccess(isAdm ? "Admin removed." : "Admin granted.");
            const term = document.getElementById('admin-search').value;
            filterAdminUsers(term);
        } catch(e) { showError("Failed: " + e.message); }
    };

    // --- SYSTEM ---
    window.closeModal = () => document.getElementById('modal-list').style.display = 'none';
    const loadGlobalFeed = () => State.listeners.feed = onSnapshot(
        query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(25)),
        s => drawFeed(s, 'feed-mount'),
        e => showError("Feed error: " + e.message)
    );
    const loadInbox = () => State.listeners.inbox = onSnapshot(
        query(collection(db, "users", auth.currentUser.uid, "conversations"), orderBy("lastSeen", "desc")),
        async s => {
            // Pre-fetch live verified status for all inbox contacts
            const uids = s.docs.map(d => d.id);
            await Promise.all(uids.map(uid => isUserVerified(uid)));
            document.getElementById('inbox-mount').innerHTML = s.docs.map(d => {
                const conv = d.data();
                const contactVerified = _verifiedCache[d.id] || false;
                return `<div class="inbox-item" onclick="nav('dm', '${d.id}')">
                    <img src="${conv.avatar || State.defaultPic}" class="avatar">
                    <div class="inbox-text">
                        <div class="inbox-name"><span>@${conv.username}</span>${contactVerified?verifiedHTML:''}</div>
                        <div class="inbox-preview">${conv.lastMsg}</div>
                    </div>
                    <span style="font-size:14px; color:var(--text-3);">›</span>
                </div>`;
            }).join('');
        },
        e => showError("Inbox error: " + e.message)
    );
    window.toggleFollow = async (id) => {
        const me = auth.currentUser.uid, isF = State.following.includes(id);
        try {
            if(isF) {
                await deleteDoc(doc(db, "users", me, "following", id));
                await deleteDoc(doc(db, "users", id, "followers", me));
                await updateDoc(doc(db, "users", me), { followingCount: increment(-1) });
                await updateDoc(doc(db, "users", id), { followersCount: increment(-1) });
            } else {
                await setDoc(doc(db, "users", me, "following", id), { active: true });
                await setDoc(doc(db, "users", id, "followers", me), { active: true });
                await updateDoc(doc(db, "users", me), { followingCount: increment(1) });
                await updateDoc(doc(db, "users", id), { followersCount: increment(1) });
            }
        } catch(e) { showError("Follow failed: " + e.message); }
    };
    window.uploadAvatar = () => { const f = document.getElementById('up-av').files[0]; if(!f) return; const rd = new FileReader(); rd.onload = async () => { try { await updateDoc(doc(db, "users", auth.currentUser.uid), { avatar: rd.result }); nav('profile'); } catch(e) { showError("Avatar upload failed: " + e.message); } }; rd.readAsDataURL(f); };
    window.handleAuth = async () => {
        const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
        try {
            if(State.isLoginMode) {
                await signInWithEmailAndPassword(auth, e, p);
            } else {
                const n = document.getElementById('auth-nick').value.toLowerCase().trim();
                if(!n) { alert("Please enter a username"); return; }
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await setDoc(doc(db, "users", res.user.uid), { username: n, avatar: '', followersCount: 0, followingCount: 0, postsCount: 0, online: true, verified: false, banned: false, isAdmin: false });
            }
        } catch(e) { alert(e.message); }
    };
    window.toggleAuth = () => { State.isLoginMode = !State.isLoginMode; document.getElementById('signup-fields').classList.toggle('hidden', State.isLoginMode); };
    window.logout = async () => {
        if(auth.currentUser) { try { await updateDoc(doc(db, "users", auth.currentUser.uid), { online: false }); } catch(e) {} }
        signOut(auth);
    };
</script>
</body>
