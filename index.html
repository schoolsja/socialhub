<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Hub Pro | Modern</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #818cf8;
            --accent: #c084fc;
            --text: #f8fafc;
            --secondary-text: #94a3b8;
            --danger: #ff4757;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%; padding: 20px; background: var(--glass); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;
        }

        .container { width: 95%; max-width: 500px; margin-top: 20px; padding-bottom: 120px; }
        .hidden { display: none !important; }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .post-media { width: 100%; border-radius: 15px; margin-top: 10px; }

        .group-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .group-pill {
            padding: 8px 18px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 50px; white-space: nowrap; cursor: pointer; font-size: 13px; transition: 0.3s;
        }
        .group-pill.active { background: var(--primary); border-color: var(--accent); box-shadow: 0 0 15px rgba(129, 140, 248, 0.4); }

        .nav-bar {
            position: fixed; bottom: 25px; background: var(--glass); backdrop-filter: blur(20px);
            padding: 10px; border-radius: 50px; display: flex; gap: 5px; border: 1px solid var(--glass-border); z-index: 1000;
        }
        .nav-btn { padding: 10px 20px; cursor: pointer; border-radius: 30px; color: var(--secondary-text); font-weight: 600; }
        .nav-btn.active { background: var(--primary); color: white; }

        .btn-gradient {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none; padding: 12px 20px; border-radius: 14px; color: white; font-weight: 700; cursor: pointer;
        }
        .btn-sm { padding: 6px 12px; font-size: 11px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.1); color: white; cursor: pointer; }
        
        input, textarea {
            width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: white; border-radius: 15px; margin: 8px 0; outline: none; box-sizing: border-box;
        }

        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        #chat-box { height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; }
        .chat-msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 13px; }
        .msg-left { background: rgba(255,255,255,0.1); align-self: flex-start; }
        .msg-right { background: var(--primary); align-self: flex-end; }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="glass-card" style="margin-top: 100px; width: 320px; text-align: center;">
        <h2>Social Hub Pro</h2>
        <input type="text" id="nickname" placeholder="Choose Username">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-gradient" style="width:100%" onclick="signUp()">Sign Up</button>
        <button onclick="login()" style="background:none; border:none; color:var(--primary); margin-top:15px; cursor:pointer;">Login Instead</button>
        <p onclick="forgotPassword()" style="font-size:11px; opacity:0.6; cursor:pointer; margin-top:10px;">Forgot Password?</p>
    </div>
</div>

<div id="main-app" class="hidden">
    <header>
        <span style="font-weight: 800;">SOCIAL HUB</span>
        <button onclick="logout()" style="color: var(--danger); background:none; border:none; font-weight:bold; cursor:pointer;">Exit</button>
    </header>

    <div class="container">
        <div class="group-tabs" id="groupSelector">
            <div class="group-pill active" onclick="filterGroup('Global')">🌍 Global</div>
            <div class="group-pill" onclick="filterGroup('Gamers')">🎮 Gamers</div>
            <div class="group-pill" onclick="filterGroup('Artists')">🎨 Artists</div>
            <div class="group-pill" onclick="filterGroup('Devs')">💻 Devs</div>
        </div>

        <div id="home-view">
            <div class="glass-card">
                <textarea id="postInput" placeholder="What's the status?"></textarea>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label style="color:var(--primary); cursor:pointer; font-size:12px;">📁 Media <input type="file" id="fileInput" accept="image/*,video/*" style="display:none"></label>
                    <button class="btn-gradient" onclick="createPost()">Post</button>
                </div>
            </div>
            <div id="feed"></div>
        </div>

        <div id="chat-view" class="hidden">
            <div class="glass-card">
                <h3 id="chat-title">#Global Chat</h3>
                <div id="chat-box"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="chatInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendChat()">
                    <button class="btn-gradient" onclick="sendChat()">Send</button>
                </div>
            </div>
        </div>

        <div id="profile-view" class="hidden">
            <div class="glass-card" style="text-align:center;">
                <img id="prof-pic" src="" class="avatar" style="width:90px; height:90px;">
                <h2 id="prof-name">@username</h2>
                <div id="my-profile-controls" class="hidden">
                    <input type="file" id="avatarInput" style="display:none" onchange="updateAvatar()">
                    <button class="btn-sm" onclick="document.getElementById('avatarInput').click()">Change Picture</button>
                    <input type="text" id="usernameInput" placeholder="Change Nickname">
                    <button class="btn-sm" onclick="changeUsername()">Update Name</button>
                </div>
                <div id="other-profile-controls" class="hidden">
                    <button id="profile-follow-btn" class="btn-gradient" style="width:100%"></button>
                </div>
                <div style="display:flex; justify-content:center; gap:20px; margin-top:15px;">
                    <div><b id="stat-followers">0</b><br><small>Followers</small></div>
                    <div><b id="stat-following">0</b><br><small>Following</small></div>
                </div>
            </div>
            <div id="profile-posts-feed"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" id="btn-home" onclick="tab('home')">Home</div>
        <div class="nav-btn" id="btn-chat" onclick="tab('chat')">Chat</div>
        <div class="nav-btn" id="btn-profile" onclick="tab('profile')">Profile</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, deleteDoc, updateDoc, increment, where, getDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDtYOFVBuPYO_CGYz1JBjOGqJoknHvZClI",
        authDomain: "socialhub-2851f.firebaseapp.com",
        projectId: "socialhub-2851f",
        storageBucket: "socialhub-2851f.firebasestorage.app",
        messagingSenderId: "38201819416",
        appId: "1:38201819416:web:db2997ca5377ac71a29e6d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentGroup = "Global";
    let followingList = [];

    onAuthStateChanged(auth, async (u) => {
        if (u) {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            syncFollowing();
            filterGroup("Global");
        } else {
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }
    });

    window.tab = (t, uid = null) => {
        ['home', 'chat', 'profile'].forEach(v => {
            document.getElementById(v + '-view').classList.add('hidden');
            document.getElementById('btn-' + v).classList.remove('active');
        });
        document.getElementById(t + '-view').classList.remove('hidden');
        document.getElementById('btn-' + t).classList.add('active');
        if(t === 'profile') loadUserProfile(uid || auth.currentUser.uid);
    };

    window.filterGroup = (g) => {
        currentGroup = g;
        document.querySelectorAll('.group-pill').forEach(p => p.classList.toggle('active', p.innerText.includes(g)));
        document.getElementById('chat-title').innerText = `#${g} Chat`;
        loadPosts(g);
        loadChat(g);
    };

    window.createPost = async () => {
        const text = document.getElementById('postInput').value;
        const file = document.getElementById('fileInput').files[0];
        if(!text && !file) return;
        
        let media = null, type = 'none';
        if(file) {
            type = file.type.startsWith('video') ? 'video' : 'image';
            media = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(file); });
        }

        const uData = (await getDoc(doc(db, "users", auth.currentUser.uid))).data();
        await addDoc(collection(db, "posts"), {
            uid: auth.currentUser.uid, username: uData.username, avatar: uData.avatar || '',
            content: text, media, mediaType: type, group: currentGroup, likes: 0, likedBy: [], createdAt: serverTimestamp()
        });
        document.getElementById('postInput').value = "";
    };

    async function renderFeed(snap, targetId) {
        const target = document.getElementById(targetId);
        target.innerHTML = "";
        for (const d of snap.docs) {
            const p = d.data();
            const isMe = p.uid === auth.currentUser.uid;
            const following = followingList.includes(p.uid);
            const hasLiked = (p.likedBy || []).includes(auth.currentUser.uid);
            
            target.innerHTML += `
                <div class="glass-card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <div style="display:flex; align-items:center; gap:8px; cursor:pointer;" onclick="tab('profile', '${p.uid}')">
                            <img src="${p.avatar || 'https://via.placeholder.com/45'}" class="avatar">
                            <b>@${p.username}</b>
                        </div>
                        <div>
                            ${!isMe ? `<button class="btn-sm" onclick="toggleFollow('${p.uid}')">${following ? 'Following' : 'Follow'}</button>` : ''}
                            ${!isMe ? `<button class="btn-sm" style="color:var(--accent)" onclick="reportPost('${d.id}')">🚩</button>` : ''}
                            ${isMe ? `<button class="btn-sm" style="color:var(--danger)" onclick="deletePost('${d.id}')">🗑️</button>` : ''}
                        </div>
                    </div>
                    <p>${p.content}</p>
                    ${p.media ? (p.mediaType === 'video' ? `<video src="${p.media}" class="post-media" controls></video>` : `<img src="${p.media}" class="post-media">`) : ''}
                    <div style="margin-top:10px; border-top:1px solid var(--glass-border); padding-top:10px;">
                        <button class="btn-sm" onclick="like('${d.id}')">${hasLiked ? '❤️' : '🤍'} ${p.likes || 0}</button>
                        <div id="comments-${d.id}"></div>
                        <input type="text" placeholder="Add comment..." style="font-size:12px;" onkeydown="if(event.key==='Enter'){addComment('${d.id}', this.value); this.value=''}">
                    </div>
                </div>`;
            loadComments(d.id);
        }
    }

    // --- NEW DELETE & REPORT FUNCTIONS ---
    window.deletePost = async (id) => {
        if(confirm("Delete this post forever?")) {
            await deleteDoc(doc(db, "posts", id));
        }
    };

    window.reportPost = async (id) => {
        const reason = prompt("Why are you reporting this post? (Spam, Hate Speech, etc.)");
        if(reason) {
            await addDoc(collection(db, "reports"), {
                postId: id,
                reporterUid: auth.currentUser.uid,
                reason: reason,
                timestamp: serverTimestamp()
            });
            alert("Thank you. The post has been flagged for review.");
        }
    };

    window.sendChat = async () => {
        const val = document.getElementById('chatInput').value;
        if(!val) return;
        const u = (await getDoc(doc(db, "users", auth.currentUser.uid))).data();
        await addDoc(collection(db, "groups", currentGroup, "messages"), {
            uid: auth.currentUser.uid, username: u.username, text: val, createdAt: serverTimestamp()
        });
        document.getElementById('chatInput').value = "";
    };

    function loadChat(g) {
        onSnapshot(query(collection(db, "groups", g, "messages"), orderBy("createdAt", "asc")), (snap) => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data(); const isMe = m.uid === auth.currentUser.uid;
                box.innerHTML += `<div class="chat-msg ${isMe ? 'msg-right' : 'msg-left'}"><small>${m.username}</small><br>${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.addComment = async (id, text) => {
        const u = (await getDoc(doc(db, "users", auth.currentUser.uid))).data();
        await addDoc(collection(db, "posts", id, "comments"), { username: u.username, avatar: u.avatar || '', text, createdAt: serverTimestamp() });
    };

    function loadComments(id) {
        onSnapshot(query(collection(db, "posts", id, "comments"), orderBy("createdAt", "asc")), (snap) => {
            const box = document.getElementById(`comments-${id}`); if(!box) return;
            box.innerHTML = "";
            snap.forEach(d => {
                const c = d.data();
                box.innerHTML += `<div class="comment-box"><img src="${c.avatar || 'https://via.placeholder.com/24'}" style="width:24px; border-radius:50%"><b>${c.username}:</b> ${c.text}</div>`;
            });
        });
    }

    async function loadUserProfile(uid) {
        const isMe = uid === auth.currentUser.uid;
        document.getElementById('my-profile-controls').classList.toggle('hidden', !isMe);
        document.getElementById('other-profile-controls').classList.toggle('hidden', isMe);
        onSnapshot(doc(db, "users", uid), (d) => {
            const data = d.data();
            document.getElementById('prof-pic').src = data.avatar || 'https://via.placeholder.com/90';
            document.getElementById('prof-name').innerText = `@${data.username}`;
            document.getElementById('stat-followers').innerText = data.followersCount || 0;
            document.getElementById('stat-following').innerText = data.followingCount || 0;
            if(!isMe) {
                const b = document.getElementById('profile-follow-btn');
                b.innerText = followingList.includes(uid) ? "Following" : "Follow";
                b.onclick = () => toggleFollow(uid);
            }
        });
        onSnapshot(query(collection(db, "posts"), where("uid", "==", uid), orderBy("createdAt", "desc")), (s) => renderFeed(s, 'profile-posts-feed'));
    }

    window.updateAvatar = async () => {
        const f = document.getElementById('avatarInput').files[0];
        const r = new FileReader();
        r.onload = async () => {
            await updateDoc(doc(db, "users", auth.currentUser.uid), { avatar: r.result });
            alert("Avatar Updated!");
        };
        r.readAsDataURL(f);
    };

    window.changeUsername = async () => {
        const n = document.getElementById('usernameInput').value.trim();
        if(n.length < 2) return;
        await updateDoc(doc(db, "users", auth.currentUser.uid), { username: n.toLowerCase() });
        alert("Username Updated!");
    };

    window.signUp = async () => {
        const e = document.getElementById('email').value, p = document.getElementById('password').value, n = document.getElementById('nickname').value;
        try {
            const res = await createUserWithEmailAndPassword(auth, e, p);
            await setDoc(doc(db, "users", res.user.uid), { username: n.toLowerCase(), avatar: '', followersCount: 0, followingCount: 0 });
            location.reload();
        } catch(err) { alert(err.message); }
    };
    window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => alert(e.message));
    window.logout = () => signOut(auth);
    window.forgotPassword = () => sendPasswordResetEmail(auth, document.getElementById('email').value).then(() => alert("Reset Link Sent!"));
    function syncFollowing() { onSnapshot(collection(db, "users", auth.currentUser.uid, "following"), s => followingList = s.docs.map(d => d.id)); }
    function loadPosts(g) { onSnapshot(query(collection(db, "posts"), where("group", "==", g), orderBy("createdAt", "desc")), s => renderFeed(s, 'feed')); }
    window.like = async (id) => {
        const ref = doc(db, "posts", id), s = await getDoc(ref), l = s.data().likedBy || [];
        l.includes(auth.currentUser.uid) ? updateDoc(ref, { likes: increment(-1), likedBy: arrayRemove(auth.currentUser.uid) }) : updateDoc(ref, { likes: increment(1), likedBy: arrayUnion(auth.currentUser.uid) });
    };
    window.toggleFollow = async (id) => {
        const m = auth.currentUser.uid, f = followingList.includes(id);
        if(f) { await deleteDoc(doc(db, "users", m, "following", id)); await updateDoc(doc(db, "users", m), { followingCount: increment(-1) }); await updateDoc(doc(db, "users", id), { followersCount: increment(-1) }); }
        else { await setDoc(doc(db, "users", m, "following", id), { t: serverTimestamp() }); await updateDoc(doc(db, "users", m), { followingCount: increment(1) }); await updateDoc(doc(db, "users", id), { followersCount: increment(1) }); }
    };
</script>
</body>
</html>
