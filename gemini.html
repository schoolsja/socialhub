<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub | Enterprise Social</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --glass: rgba(13, 16, 22, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --text: #ffffff;
            --subtext: #94a3b8;
            --danger: #ff4d4d;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; line-height: 1.6; }

        /* UI Structure */
        .view-section { display: none; opacity: 0; transform: translateY(10px); transition: var(--transition); }
        .view-section.active { display: block; opacity: 1; transform: translateY(0); }
        header { position: sticky; top: 0; z-index: 1000; padding: 15px 20px; background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
        .container { width: 92%; max-width: 600px; margin: 20px auto 120px auto; }

        /* Components */
        .glass-card { background: var(--surface); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; margin-bottom: 16px; transition: var(--transition); }
        .nav-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(10, 12, 16, 0.95); backdrop-filter: blur(20px); padding: 8px; border-radius: 100px; display: flex; gap: 5px; border: 1px solid var(--glass-border); z-index: 2000; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .nav-btn { width: 48px; height: 48px; border-radius: 50%; border: none; background: transparent; color: var(--subtext); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: var(--transition); }
        .nav-btn.active { background: var(--primary); color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }

        /* Buttons & Inputs */
        .btn-action { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; border: none; padding: 12px 24px; border-radius: 14px; font-weight: 700; cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; gap: 8px; }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
        input, textarea { width: 100%; padding: 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 14px; color: white; font-family: inherit; font-size: 14px; transition: var(--transition); }
        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.06); }

        /* Profile & Media */
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #1a1d23; border: 1px solid var(--glass-border); }
        .post-media { width: 100%; border-radius: 16px; margin-top: 12px; max-height: 400px; object-fit: cover; }
        .clickable { cursor: pointer; transition: 0.2s; }
        .clickable:hover { opacity: 0.7; }

        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--surface); border: 1px solid var(--glass-border); border-radius: 28px; width: 100%; max-width: 400px; max-height: 80vh; overflow-y: auto; padding: 24px; }

        /* Chat & DM */
        .chat-scroll { height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }
        .msg-pop { padding: 10px 16px; border-radius: 18px; max-width: 80%; font-size: 14px; }
        .msg-sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg-rec { align-self: flex-start; background: rgba(255,255,255,0.08); border-bottom-left-radius: 4px; }
        
        .inbox-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 18px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .inbox-item:hover { background: rgba(255,255,255,0.03); border-color: var(--glass-border); }

        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
    </style>
</head>
<body>

<div id="modal-list" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="modal-title" style="margin-bottom: 20px;">Users</h3>
        <div id="modal-body"></div>
    </div>
</div>

<div id="auth-screen">
    <div class="glass-card" style="margin: 100px auto; width: 340px; text-align: center;">
        <h2 style="font-size: 32px; margin-bottom: 8px;">Hub</h2>
        <div id="signup-fields" class="hidden">
            <input type="text" id="auth-nick" placeholder="Username" style="margin-bottom: 10px;">
        </div>
        <input type="email" id="auth-email" placeholder="Email" style="margin-bottom: 10px;">
        <input type="password" id="auth-pass" placeholder="Password" style="margin-bottom: 20px;">
        <button class="btn-action" style="width: 100%;" onclick="handleAuth()">Continue</button>
        <p onclick="toggleAuth()" id="auth-toggle-text" style="margin-top: 20px; font-size: 13px; color: var(--subtext); cursor: pointer;">New here? <span style="color:var(--primary)">Create Account</span></p>
    </div>
</div>

<div id="app-main" class="hidden">
    <header>
        <span style="font-weight: 800; font-size: 20px;">HUB<span style="color:var(--primary)">.</span></span>
        <button onclick="logout()" style="background:none; border:none; color:var(--subtext); cursor:pointer; font-weight:700;">Logout</button>
    </header>

    <div class="container">
        <section id="v-home" class="view-section active">
            <div class="glass-card">
                <textarea id="p-text" placeholder="What's happening?" rows="3" style="margin-bottom: 12px;"></textarea>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label class="clickable" style="font-size:12px; font-weight:700; color:var(--subtext);">
                        🖼️ MEDIA <input type="file" id="p-file" accept="image/*,video/*" style="display:none">
                    </label>
                    <button id="p-btn" class="btn-action" onclick="createPost()">Post Blast</button>
                </div>
            </div>
            <div id="feed-mount"></div>
        </section>

        <section id="v-search" class="view-section">
            <div class="glass-card"><input type="text" placeholder="Search people..." oninput="searchUsers(this.value)"></div>
            <div id="search-mount"></div>
        </section>

        <section id="v-chat" class="view-section">
            <div class="glass-card">
                <h3 style="margin-bottom:15px;">Global Chat</h3>
                <div id="chat-mount" class="chat-scroll"></div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <input type="text" id="chat-in" placeholder="Message..." onkeydown="if(event.key==='Enter') sendGlobalChat()">
                    <button class="btn-action" onclick="sendGlobalChat()">Send</button>
                </div>
            </div>
        </section>

        <section id="v-inbox" class="view-section">
            <h3 style="margin-bottom:20px;">Messages</h3>
            <div id="inbox-mount"></div>
        </section>

        <section id="v-dm" class="view-section">
            <div class="glass-card">
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px;">
                    <button onclick="nav('inbox')" style="background:none; border:none; color:var(--primary); cursor:pointer; font-size:20px;">←</button>
                    <img id="dm-avatar" src="" class="avatar">
                    <b id="dm-name">Chat</b>
                </div>
                <div id="dm-mount" class="chat-scroll"></div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <input type="text" id="dm-in" placeholder="Private message..." onkeydown="if(event.key==='Enter') sendDirectMessage()">
                    <button class="btn-action" onclick="sendDirectMessage()">Send</button>
                </div>
            </div>
        </section>

        <section id="v-profile" class="view-section">
            <div class="glass-card" style="text-align:center;">
                <img id="u-pic" src="" class="avatar" style="width:100px; height:100px; border-radius:35px; border:3px solid var(--glass-border);">
                <h2 id="u-nick" style="margin:12px 0 4px 0;">@username</h2>
                <div id="u-actions" style="margin: 15px 0; display:flex; justify-content:center; gap:10px;"></div>
                <div style="display:flex; justify-content:center; gap:30px; margin-top:20px; border-top:1px solid var(--glass-border); padding-top:20px;">
                    <div class="clickable" onclick="openRelationModal('posts')"><b id="u-postcount">0</b><br><small style="color:var(--subtext)">Posts</small></div>
                    <div class="clickable" onclick="openRelationModal('followers')"><b id="u-foll">0</b><br><small style="color:var(--subtext)">Followers</small></div>
                    <div class="clickable" onclick="openRelationModal('following')"><b id="u-fing">0</b><br><small style="color:var(--subtext)">Following</small></div>
                </div>
            </div>
            <div id="u-feed"></div>
        </section>
    </div>

    <nav class="nav-bar">
        <button class="nav-btn active" id="n-home" onclick="nav('home')">🏠</button>
        <button class="nav-btn" id="n-search" onclick="nav('search')">🔍</button>
        <button class="nav-btn" id="n-chat" onclick="nav('chat')">💬</button>
        <button class="nav-btn" id="n-inbox" onclick="nav('inbox')">✉️</button>
        <button class="nav-btn" id="n-profile" onclick="nav('profile')">👤</button>
    </nav>
</div>



<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, deleteDoc, updateDoc, increment, where, getDoc, getDocs, arrayUnion, arrayRemove, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // --- CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyDtYOFVBuPYO_CGYz1JBjOGqJoknHvZClI",
        authDomain: "socialhub-2851f.firebaseapp.com",
        projectId: "socialhub-2851f",
        storageBucket: "socialhub-2851f.firebasestorage.app",
        messagingSenderId: "38201819416",
        appId: "1:38201819416:web:db2997ca5377ac71a29e6d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // --- APP STATE ---
    const State = {
        listeners: {},
        following: [],
        isLoginMode: true,
        currentView: 'home',
        activeChatId: null,
        activeProfileId: null,
        defaultPic: "https://cdn-icons-png.flaticon.com/512/149/149071.png"
    };

    const killListeners = () => Object.keys(State.listeners).forEach(k => { State.listeners[k](); delete State.listeners[k]; });

    // --- AUTH OBSERVER ---
    onAuthStateChanged(auth, async (u) => {
        if (u) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-main').classList.remove('hidden');
            State.listeners.me = onSnapshot(collection(db, "users", u.uid, "following"), s => {
                State.following = s.docs.map(d => d.id);
                if(State.currentView === 'profile') loadUserProfile(State.activeProfileId);
            });
            nav('home');
        } else {
            killListeners();
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('app-main').classList.add('hidden');
        }
    });

    // --- NAVIGATION ---
    window.nav = (target, params = null) => {
        // Clean up view-specific listeners
        ['feed', 'chat', 'prof', 'dm', 'inbox'].forEach(k => { if(State.listeners[k]) { State.listeners[k](); delete State.listeners[k]; } });
        
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        const targetEl = document.getElementById(`v-${target}`);
        if(!targetEl) return;
        targetEl.classList.add('active');
        State.currentView = target;
        
        const navBtn = document.getElementById(`n-${target}`);
        if(navBtn) navBtn.classList.add('active');

        if(target === 'home') loadGlobalFeed();
        if(target === 'chat') loadGlobalChat();
        if(target === 'profile') loadUserProfile(params || auth.currentUser.uid);
        if(target === 'inbox') loadInbox();
        if(target === 'dm') openConversation(params);
        
        window.scrollTo(0,0);
    };

    // --- CORE FEATURES: FEED & POSTS ---
    window.createPost = async () => {
        const txt = document.getElementById('p-text').value.trim();
        const file = document.getElementById('p-file').files[0];
        if(!txt && !file) return;
        
        const btn = document.getElementById('p-btn');
        btn.disabled = true; btn.innerText = "Blasting...";

        try {
            const uData = (await getDoc(doc(db, "users", auth.currentUser.uid))).data();
            let media = null, mType = 'none';
            if(file) {
                mType = file.type.startsWith('video') ? 'video' : 'image';
                media = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(file); });
            }

            await addDoc(collection(db, "posts"), {
                uid: auth.currentUser.uid,
                username: uData.username,
                avatar: uData.avatar || State.defaultPic,
                content: txt,
                media, mediaType: mType,
                likes: 0, likedBy: [],
                createdAt: serverTimestamp()
            });

            // NEW: Increment Post Count
            await updateDoc(doc(db, "users", auth.currentUser.uid), { postsCount: increment(1) });

            document.getElementById('p-text').value = "";
            document.getElementById('p-file').value = "";
        } catch(e) { console.error(e); }
        finally { btn.disabled = false; btn.innerText = "Post Blast"; }
    };

    const drawFeed = (snap, targetId) => {
        const box = document.getElementById(targetId);
        if(snap.empty) { box.innerHTML = `<p style="text-align:center; color:var(--subtext); margin-top:50px;">No posts here yet.</p>`; return; }
        
        box.innerHTML = snap.docs.map(d => {
            const p = d.data();
            const id = d.id;
            const isLiked = (p.likedBy || []).includes(auth.currentUser.uid);
            return `
            <div class="glass-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="clickable" style="display:flex; align-items:center; gap:12px;" onclick="nav('profile', '${p.uid}')">
                        <img src="${p.avatar || State.defaultPic}" class="avatar">
                        <b>@${p.username}</b>
                    </div>
                    ${p.uid === auth.currentUser.uid ? `<button onclick="deletePostItem('${id}')" style="background:none; border:none; color:var(--danger); cursor:pointer;">🗑️</button>` : ''}
                </div>
                <p style="margin:15px 0; white-space:pre-wrap;">${p.content}</p>
                ${p.media ? (p.mediaType === 'video' ? `<video src="${p.media}" class="post-media" controls></video>` : `<img src="${p.media}" class="post-media">`) : ''}
                <div style="margin-top:15px; display:flex; gap:25px;">
                    <span class="clickable" onclick="handleLike('${id}')" style="font-weight:700; color:${isLiked?'var(--primary)':'var(--subtext)'}">${isLiked?'❤️':'🤍'} ${p.likes||0}</span>
                </div>
                <div id="cm-box-${id}" style="margin-top:15px; border-top:1px solid var(--glass-border); padding-top:10px;">
                    <div id="cm-list-${id}" style="font-size:13px; margin-bottom:10px;"></div>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="cm-in-${id}" placeholder="Comment..." style="padding:8px; font-size:12px;">
                        <button class="btn-action" onclick="addComment('${id}')" style="padding:5px 12px; font-size:12px;">Post</button>
                    </div>
                </div>
            </div>`;
        }).join('');
        snap.docs.forEach(d => syncComments(d.id));
    };

    function loadGlobalFeed() {
        State.listeners.feed = onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(25)), s => drawFeed(s, 'feed-mount'));
    }

    // --- PROFILE & RELATIONSHIPS (ENHANCED) ---
    async function loadUserProfile(uid) {
        State.activeProfileId = uid;
        const uSnap = await getDoc(doc(db, "users", uid));
        if(!uSnap.exists()) return;
        const u = uSnap.data();
        
        document.getElementById('u-pic').src = u.avatar || State.defaultPic;
        document.getElementById('u-nick').innerText = `@${u.username}`;
        document.getElementById('u-foll').innerText = u.followersCount || 0;
        document.getElementById('u-fing').innerText = u.followingCount || 0;
        document.getElementById('u-postcount').innerText = u.postsCount || 0;

        const acts = document.getElementById('u-actions');
        if(uid === auth.currentUser.uid) {
            acts.innerHTML = `<input type="file" id="up-av" style="display:none" onchange="uploadAvatar()"><button class="btn-action" onclick="document.getElementById('up-av').click()">Edit Avatar</button>`;
        } else {
            const isF = State.following.includes(uid);
            acts.innerHTML = `
                <button class="btn-action" style="${isF?'background:var(--glass)':''}" onclick="toggleFollow('${uid}')">${isF?'Unfollow':'Follow'}</button>
                <button class="btn-action" style="background:var(--surface); border:1px solid var(--glass-border)" onclick="nav('dm', '${uid}')">Message</button>
            `;
        }
        State.listeners.prof = onSnapshot(query(collection(db, "posts"), where("uid", "==", uid), orderBy("createdAt", "desc")), s => drawFeed(s, 'u-feed'));
    }

    // NEW: Followers/Following Modals
    window.openRelationModal = async (type) => {
        if(type === 'posts') return;
        const modal = document.getElementById('modal-list');
        const body = document.getElementById('modal-body');
        const title = document.getElementById('modal-title');
        title.innerText = type === 'followers' ? 'Followers' : 'Following';
        body.innerHTML = "Loading...";
        modal.style.display = "flex";

        const path = type === 'followers' ? collection(db, "users") : collection(db, "users", State.activeProfileId, "following");
        let q;
        if(type === 'followers') {
            // This is a simplified fetch - for production, use a dedicated 'followers' subcollection
            q = query(collection(db, "users")); 
        } else {
            q = query(path);
        }
        
        const snap = await getDocs(q);
        const users = [];
        for(let d of snap.docs) {
            const uInfo = await getDoc(doc(db, "users", d.id));
            if(uInfo.exists()) users.push({ id: d.id, ...uInfo.data() });
        }

        body.innerHTML = users.map(u => `
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:15px;">
                <div class="clickable" style="display:flex; align-items:center; gap:12px;" onclick="closeModal(); nav('profile', '${u.id}')">
                    <img src="${u.avatar || State.defaultPic}" class="avatar" style="width:35px; height:35px;">
                    <b>@${u.username}</b>
                </div>
            </div>
        `).join('') || "No users found.";
    };

    window.closeModal = (e) => { document.getElementById('modal-list').style.display = "none"; };

    // --- NEW: DIRECT MESSAGING SYSTEM ---
    const getChatId = (u1, u2) => [u1, u2].sort().join('_');

    async function openConversation(otherId) {
        const chatId = getChatId(auth.currentUser.uid, otherId);
        State.activeChatId = chatId;
        
        const otherDoc = await getDoc(doc(db, "users", otherId));
        const other = otherDoc.data();
        document.getElementById('dm-avatar').src = other.avatar || State.defaultPic;
        document.getElementById('dm-name').innerText = `@${other.username}`;
        
        // Ensure conversation exists in user index
        await setDoc(doc(db, "users", auth.currentUser.uid, "conversations", otherId), { lastSeen: serverTimestamp(), username: other.username, avatar: other.avatar || '' }, { merge: true });
        
        State.listeners.dm = onSnapshot(query(collection(db, "conversations", chatId, "messages"), orderBy("createdAt", "asc"), limit(50)), s => {
            const box = document.getElementById('dm-mount');
            box.innerHTML = s.docs.map(d => {
                const m = d.data(); const isMe = m.uid === auth.currentUser.uid;
                return `<div class="msg-pop ${isMe?'msg-sent':'msg-rec'}">${m.text}</div>`;
            }).join('');
            box.scrollTop = box.scrollHeight;
        });
    }

    window.sendDirectMessage = async () => {
        const val = document.getElementById('dm-in').value.trim(); if(!val || !State.activeChatId) return;
        const otherId = State.activeChatId.replace(auth.currentUser.uid, "").replace("_", "");
        
        const msg = { uid: auth.currentUser.uid, text: val, createdAt: serverTimestamp() };
        await addDoc(collection(db, "conversations", State.activeChatId, "messages"), msg);
        
        // Update both users' inbox metadata
        const me = (await getDoc(doc(db, "users", auth.currentUser.uid))).data();
        await setDoc(doc(db, "users", otherId, "conversations", auth.currentUser.uid), { lastMsg: val, lastSeen: serverTimestamp(), username: me.username, avatar: me.avatar || '' }, { merge: true });
        
        document.getElementById('dm-in').value = "";
    };

    function loadInbox() {
        State.listeners.inbox = onSnapshot(query(collection(db, "users", auth.currentUser.uid, "conversations"), orderBy("lastSeen", "desc")), s => {
            const mount = document.getElementById('inbox-mount');
            if(s.empty) { mount.innerHTML = `<p style="text-align:center; color:var(--subtext); margin-top:40px;">No private messages yet.</p>`; return; }
            mount.innerHTML = s.docs.map(d => {
                const c = d.data();
                return `
                <div class="inbox-item" onclick="nav('dm', '${d.id}')">
                    <img src="${c.avatar || State.defaultPic}" class="avatar">
                    <div style="flex:1">
                        <div style="font-weight:800;">@${c.username}</div>
                        <div style="font-size:12px; color:var(--subtext); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px;">${c.lastMsg || 'View chat'}</div>
                    </div>
                </div>`;
            }).join('');
        });
    }

    // --- LEGACY COMPATIBILITY LOGIC ---
    window.addComment = async (pid) => {
        const inEl = document.getElementById(`cm-in-${pid}`); if(!inEl.value.trim()) return;
        const u = (await getDoc(doc(db, "users", auth.currentUser.uid))).data();
        await addDoc(collection(db, "posts", pid, "comments"), { uid: auth.currentUser.uid, username: u.username, text: inEl.value, createdAt: serverTimestamp() });
        inEl.value = "";
    };

    function syncComments(pid) {
        onSnapshot(query(collection(db, "posts", pid, "comments"), orderBy("createdAt", "asc")), s => {
            const list = document.getElementById(`cm-list-${pid}`);
            if(list) list.innerHTML = s.docs.map(d => `<div><b>@${d.data().username}</b> ${d.data().text}</div>`).join('');
        });
    }

    window.sendGlobalChat = async () => {
        const v = document.getElementById('chat-in').value; if(!v.trim()) return;
        const u = (await getDoc(doc(db, "users", auth.currentUser.uid))).data();
        await addDoc(collection(db, "chats"), { uid: auth.currentUser.uid, name: u.username, text: v, createdAt: serverTimestamp() });
        document.getElementById('chat-in').value = "";
    };

    function loadGlobalChat() {
        State.listeners.chat = onSnapshot(query(collection(db, "chats"), orderBy("createdAt", "asc"), limit(50)), s => {
            const box = document.getElementById('chat-mount');
            box.innerHTML = s.docs.map(d => {
                const m = d.data(); const isMe = m.uid === auth.currentUser.uid;
                return `<div class="msg-pop ${isMe?'msg-sent':'msg-rec'}"><b>${m.name}</b><br>${m.text}</div>`;
            }).join('');
            box.scrollTop = box.scrollHeight;
        });
    }

    window.searchUsers = async (v) => {
        if(!v.trim()) return document.getElementById('search-mount').innerHTML = "";
        const snap = await getDocs(query(collection(db, "users"), where("username", ">=", v.toLowerCase()), limit(10)));
        document.getElementById('search-mount').innerHTML = snap.docs.map(d => `
            <div class="glass-card clickable" onclick="nav('profile', '${d.id}')" style="display:flex; align-items:center; gap:15px;">
                <img src="${d.data().avatar || State.defaultPic}" class="avatar">
                <b>@${d.data().username}</b>
            </div>`).join('');
    };

    window.handleLike = async (id) => {
        const r = doc(db, "posts", id), s = await getDoc(r), l = s.data().likedBy || [];
        const has = l.includes(auth.currentUser.uid);
        await updateDoc(r, { likes: increment(has?-1:1), likedBy: has?arrayRemove(auth.currentUser.uid):arrayUnion(auth.currentUser.uid) });
    };

    window.toggleFollow = async (id) => {
        const me = auth.currentUser.uid;
        const isF = State.following.includes(id);
        if(isF) {
            await deleteDoc(doc(db, "users", me, "following", id));
            await updateDoc(doc(db, "users", me), { followingCount: increment(-1) });
            await updateDoc(doc(db, "users", id), { followersCount: increment(-1) });
        } else {
            await setDoc(doc(db, "users", me, "following", id), { active: true });
            await updateDoc(doc(db, "users", me), { followingCount: increment(1) });
            await updateDoc(doc(db, "users", id), { followersCount: increment(1) });
        }
    };

    window.handleAuth = async () => {
        const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
        try {
            if(State.isLoginMode) await signInWithEmailAndPassword(auth, e, p);
            else {
                const n = document.getElementById('auth-nick').value.toLowerCase();
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await setDoc(doc(db, "users", res.user.uid), { username: n, avatar: '', followersCount: 0, followingCount: 0, postsCount: 0 });
            }
        } catch(e) { alert(e.message); }
    };

    window.toggleAuth = () => { State.isLoginMode = !State.isLoginMode; document.getElementById('signup-fields').classList.toggle('hidden', State.isLoginMode); document.getElementById('auth-toggle-text').innerHTML = State.isLoginMode ? 'New here? <span style="color:var(--primary)">Create Account</span>' : 'Have an account? <span style="color:var(--primary)">Login</span>'; };
    window.uploadAvatar = () => { const f = document.getElementById('up-av').files[0]; const rd = new FileReader(); rd.onload = async () => { await updateDoc(doc(db, "users", auth.currentUser.uid), { avatar: rd.result }); nav('profile'); }; rd.readAsDataURL(f); };
    window.deletePostItem = async (id) => { if(confirm("Delete?")) { await deleteDoc(doc(db, "posts", id)); await updateDoc(doc(db, "users", auth.currentUser.uid), { postsCount: increment(-1) }); } };
    window.logout = () => signOut(auth);

</script>
</body>
</html>
